<div class="border-b border-slate-100">
  <div class="flex items-end gap-2 w-full overflow-x-auto scrollbar-hide">

    <!-- Search Input -->
    <div *ngIf="showSearch" class="relative flex-shrink-0 w-56">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="h-4 w-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
      <input
        type="search"
        required
        aria-required="true"
        [ngModel]="searchText"
        (ngModelChange)="onSearchTextChange($event)"
        (keyup.enter)="onSearch()"
        [placeholder]="searchPlaceholder"
        class="block w-full pl-9 pr-3 py-1.5 border border-slate-200 rounded-lg text-sm
               focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-slate-700"
      />
    </div>

    <!-- Apply Button -->
    <button
      *ngIf="showSearch"
      type="button"
      (click)="onSearch()"
      [disabled]="!hasValidSearchText"
      class="flex-shrink-0 px-3 py-1.5 bg-blue-500 text-white rounded-lg text-sm font-medium
             hover:bg-blue-600 transition-colors disabled:opacity-60 disabled:cursor-not-allowed"
    >
      {{ applyLabel }}
    </button>

    <!-- Divider -->
    <div *ngIf="showSearch" class="flex-shrink-0 w-px h-5 bg-slate-200 self-center"></div>

    <!-- Projected filter controls (dropdowns, ranges, etc.) -->
    <div class="flex items-end gap-2 flex-1 min-w-0">
      <ng-content></ng-content>
    </div>

    <!-- Divider -->
    <div class="flex-shrink-0 w-px h-5 bg-slate-200 self-center"></div>

    <!-- Clear Button -->
    <button
      type="button"
      (click)="onClear()"
      class="flex-shrink-0 px-3 py-1.5 bg-red-500 text-white rounded-lg text-sm font-medium
             hover:bg-red-600 transition-colors disabled:opacity-60 disabled:cursor-not-allowed"
    >
      {{ clearLabel }}
    </button>

  </div>
</div>
