<div class="w-full">
  <div class="flex flex-col gap-6">

    <!-- Titles row -->
    <div class="flex flex-col lg:flex-row gap-6">
      <div class="w-full lg:w-7/12">
        <div *ngIf="showLeftTitle && leftTitle" class="mb-3">
          <h2 class="text-sm font-semibold text-slate-700">{{ leftTitle }}</h2>
        </div>
      </div>

      <div class="w-full lg:w-5/12 lg:border-l lg:border-gray-200 lg:pl-6">
        <div *ngIf="showRightTitle && rightTitle" class="mb-3">
          <h2 class="text-sm font-semibold text-slate-700">{{ rightTitle }}</h2>
        </div>
      </div>
    </div>

       <!-- Main columns -->
    <div class="flex flex-col lg:flex-row gap-6">
      <section class="w-full lg:w-7/12">
        <!-- Global top header (spans above both columns) -->
        <div *ngIf="hasExtraTableHeader()" class="mb-4">
          <ng-container *ngTemplateOutlet="extraTableHeader ?? null"></ng-container>
        </div>
        <div *ngIf="hasLeftExtraHeader()" class="mb-4">
          <ng-container *ngTemplateOutlet="leftExtraTableHeader ?? null"></ng-container>
        </div>

        <ng-container *ngIf="hasLeft()">
          <ng-container *ngTemplateOutlet="leftContent ?? null"></ng-container>
        </ng-container>
      </section>

      <section class="w-full lg:w-5/12 lg:border-l lg:border-gray-200 lg:pl-6">
        <div *ngIf="hasRightExtraHeader()" class="mb-4">
          <ng-container *ngTemplateOutlet="rightExtraTableHeader ?? null"></ng-container>
        </div>

        <ng-container *ngIf="hasRight(); else rightPlaceholder">
          <!-- If rightItem is provided, render default actions and pass item into rightContent -->
          <ng-container *ngIf="hasRightItem(); else customRightContent">
            <div
              class="mb-4 flex items-center justify-between flex-wrap gap-3"
              *ngIf="showRightEditButton || showRightCloseButton"
            >
              <app-action-icon-button
                *ngIf="showRightEditButton"
                icon="edit"
                [size]="'md'"
                (click)="rightEdit.emit(rightItem)"
              ></app-action-icon-button>

              <app-action-icon-button
                *ngIf="showRightCloseButton"
                icon="close"
                (click)="rightClose.emit()"
              ></app-action-icon-button>
            </div>

            <div *ngIf="rightItem; else rightEmpty">
              <ng-container
                *ngTemplateOutlet="rightContent ?? null; context: { $implicit: rightItem }"
              ></ng-container>
            </div>

            <ng-template #rightEmpty>
              <div class="text-sm text-gray-500">{{ rightEmptyMessage }}</div>
            </ng-template>
          </ng-container>

          <!-- Backward compatible: just render rightContent without any wrapper -->
          <ng-template #customRightContent>
            <ng-container *ngTemplateOutlet="rightContent ?? null"></ng-container>
          </ng-template>
        </ng-container>

        <ng-template #rightPlaceholder>
          <div class="text-sm text-gray-500">
            Select a row from the table to view details.
          </div>
        </ng-template>
      </section>
    </div>
  </div>
</div>
