<!-- Modal Backdrop & Container -->
<div
  *ngIf="visible"
  class="fixed inset-0 z-[2000] flex items-center justify-center"
  (click)="handleMaskClick()"
>
  <!-- Backdrop -->
  <div class="fixed inset-0 bg-black bg-opacity-50 transition-opacity"></div>

  <!-- Modal Wrapper -->
  <div
    [class]="'w-full px-4 text-center flex ' + modalPositionClass"
  >
    <!-- Modal Content -->
      <div
        (click)="stopPropagation($event)"
        [class]="'font-sans inline-block w-full ' + modalSizeClass + ' bg-white rounded-lg text-left shadow-xl transform transition-all max-h-[90vh] flex flex-col'"
      >

      <!-- Header -->
      <div *ngIf="showHeader" class="bg-white px-6 py-4 border-b border-gray-200">
        <div class="flex items-center justify-between">
          <!-- Custom Header Template or Default Title -->
          <ng-container *ngIf="modalHeader; else defaultHeader">
            <ng-container *ngTemplateOutlet="modalHeader"></ng-container>
          </ng-container>
          <ng-template #defaultHeader>
            <h3 class="text-lg font-semibold text-gray-900">
              {{ title }}
            </h3>
          </ng-template>

          <!-- Close Button -->
          <button
            *ngIf="closable"
            (click)="close()"
            class="text-gray-400 hover:text-gray-600 transition-colors"
          >
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>
      </div>

      <!-- Body -->
      <div class="bg-white px-6 py-4 flex-1 overflow-y-auto">
        <ng-container *ngIf="modalBody; else defaultBody">
          <ng-container *ngTemplateOutlet="modalBody"></ng-container>
        </ng-container>
        <ng-template #defaultBody>
          <ng-content></ng-content>
        </ng-template>
      </div>

      <!-- Footer -->
      <div *ngIf="showFooter" class="bg-gray-50 px-6 py-4 border-t border-gray-200">
        <!-- Custom Footer Template or Default Buttons -->
        <ng-container *ngIf="modalFooter; else defaultFooter">
          <ng-container *ngTemplateOutlet="modalFooter"></ng-container>
        </ng-container>
        <ng-template #defaultFooter>
          <div class="flex items-center justify-end space-x-3">
            <!-- Cancel Button -->
            <button
              *ngIf="showCancelButton"
              (click)="handleCancel()"
              [class]="'px-4 py-2 rounded-lg font-medium transition-colors ' + cancelButtonClass"
            >
              {{ cancelText }}
            </button>

            <!-- Confirm Button -->
            <button
              *ngIf="showConfirmButton"
              (click)="handleConfirm()"
              [disabled]="confirmDisabled || confirmLoading"
              [class]="'px-4 py-2 rounded-lg font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed ' + confirmButtonClass"
            >
              <span *ngIf="confirmLoading" class="inline-flex items-center">
                <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Loading...
              </span>
              <span *ngIf="!confirmLoading">{{ confirmText }}</span>
            </button>
          </div>
        </ng-template>
      </div>

    </div>
  </div>
</div>
