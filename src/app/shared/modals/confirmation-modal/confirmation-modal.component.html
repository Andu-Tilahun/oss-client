<app-modal
  [(visible)]="visible"
  [title]="title"
  size="sm"
  [confirmText]="confirmText"
  [cancelText]="cancelText"
  [confirmLoading]="confirmLoading"
  [confirmButtonClass]="iconConfig.buttonColor"
  (confirm)="handleConfirm()"
  (cancel)="handleCancel()"
  (visibleChange)="visibleChange.emit($event)"
>
  <div class="flex items-start space-x-4">
    <div class="flex-shrink-0">
      <div [class]="'w-12 h-12 rounded-full flex items-center justify-center ' + iconConfig.bgColor">
        <svg [class]="'w-6 h-6 ' + iconConfig.iconColor" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="iconConfig.icon"></path>
        </svg>
      </div>
    </div>
    <div class="flex-1">
      <p class="text-gray-700">{{ message }}</p>
    </div>
  </div>
</app-modal>
