<div class="gallery-overlay" *ngIf="visible">
  <div class="gallery-backdrop" (click)="close()"></div>

  <div class="gallery-panel" role="dialog" aria-modal="true" [attr.aria-label]="title">
    <div class="gallery-header">
      <button type="button" class="back-btn" (click)="close()" aria-label="Go back">← Back</button>
      <h3 class="gallery-title">{{ title }}</h3>
      <button type="button" class="close-btn" (click)="close()" aria-label="Close gallery">×</button>
    </div>

    <div *ngIf="loading" class="gallery-empty">Loading gallery...</div>

    <div *ngIf="!loading && !hasImages" class="gallery-empty">No gallery images available.</div>

    <div *ngIf="!loading && hasImages" class="gallery-content">
      <div class="image-stage">
        <img [src]="activeImageUrl" alt="Gallery image" class="active-image" />

        <button type="button" class="gallery-nav left-2" (click)="goPrevious()" aria-label="Previous image">
          &#10094;
        </button>
        <button type="button" class="gallery-nav right-2" (click)="goNext()" aria-label="Next image">
          &#10095;
        </button>
      </div>

      <div class="gallery-counter">
        <span>Image {{ activeIndex + 1 }} of {{ imageUrls.length }}</span>
      </div>

      <div class="gallery-thumbs">
        <button
          *ngFor="let imageUrl of imageUrls; index as idx"
          type="button"
          class="thumb-btn"
          [class.active]="idx === activeIndex"
          (click)="setActiveIndex(idx)"
        >
          <img [src]="imageUrl" [alt]="'Gallery image ' + (idx + 1)" class="thumb-image" />
        </button>
      </div>
    </div>
  </div>
</div>
