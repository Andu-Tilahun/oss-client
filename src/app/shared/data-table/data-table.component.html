<div class="w-full">

  <!-- Action Header -->
  <div class="mb-4 flex items-center justify-between flex-wrap gap-3 bg-white p-4" *ngIf="showAddButton||showRefreshButton">
    <div class="flex items-center gap-2">
      <!-- Add Button -->
      <button
        *ngIf="showAddButton"
        (click)="addClick.emit()"
        class="inline-flex items-center justify-center w-8 h-8 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-all duration-200 shadow-sm hover:shadow"
        title="Add"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
      </button>

      <!-- Refresh Button -->
      <button
        *ngIf="showRefreshButton"
        (click)="refreshClick.emit()"
        class="inline-flex items-center justify-center w-8 h-8 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-all duration-200 shadow-sm hover:shadow"
        title="Refresh"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
        </svg>
      </button>

      <!-- Export Button -->
      <button
        *ngIf="showExportButton"
        (click)="exportClick.emit()"
        class="inline-flex items-center justify-center w-8 h-8 bg-blue-500 hover:bg-blue-600 text-white rounded-lg transition-all duration-200 shadow-sm hover:shadow"
        title="Export"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
        </svg>
      </button>
    </div>

    <!-- Extra Content Projection -->
    <div class="flex-1 bg-white">
      <ng-content select="[extraTableHeader]"></ng-content>
    </div>
  </div>

  <!-- Table Container -->
  <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">

    <!-- Loading Overlay -->
    <div *ngIf="loading" class="relative">
      <div class="absolute inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center z-10">
        <div class="flex items-center space-x-2">
          <svg class="animate-spin h-6 w-6 text-blue-500" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span class="text-sm text-gray-600">Loading...</span>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto">
      <table class="min-w-full">
        <!-- Table Head -->
        <thead>
        <tr class="bg-slate-50/80 border-b border-slate-200">
          <th *ngIf="showIndex" class="px-5 py-3 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">
            #
          </th>
          <th *ngFor="let column of columns" class="px-5 py-3 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">
            {{ column.header }}
          </th>
          <th *ngIf="showActionColumn" class="px-5 py-3 text-left text-xs font-semibold text-slate-600 uppercase tracking-wider">
            Actions
          </th>
        </tr>
        </thead>

        <!-- Table Body -->
        <tbody class="divide-y divide-slate-100">
        <tr
          *ngFor="let item of paginatedData; let i = index; trackBy: trackByIndex"
          class="hover:bg-slate-50/60 transition-colors duration-150"
          [class.cursor-pointer]="rowClickable"
          (click)="handleRowClick(item, $event)"
        >
          <!-- Index Column -->
          <td *ngIf="showIndex" class="px-5 py-3.5 whitespace-nowrap text-sm text-slate-700">
            {{ (pageIndex - 1) * pageSize + i + 1 }}
          </td>

          <!-- Data Columns -->
          <td *ngFor="let column of columns" class="px-5 py-3.5 whitespace-nowrap text-sm text-slate-700">
            <ng-container [ngSwitch]="column.columnType">
              <!-- Button Type -->
              <ng-container *ngSwitchCase="columnType.BUTTON">
                <button
                  (click)="$event.stopPropagation(); column.columnAction?.(item)"
                  class="text-blue-600 hover:text-blue-700 font-medium transition-colors"
                >
                  {{ column.value ? column.value(item) : '' }}
                </button>
              </ng-container>

              <!-- Link Type -->
              <ng-container *ngSwitchCase="columnType.LINK">
                <a
                  href="javascript:void(0)"
                  (click)="$event.stopPropagation(); column.columnAction?.(item)"
                  class="text-blue-600 hover:text-blue-700 font-medium transition-colors"
                >
                  {{ column.value ? column.value(item) : '' }}
                </a>
              </ng-container>

              <!-- Checkbox Type -->
              <ng-container *ngSwitchCase="columnType.CHECK_BOX">
                <input
                  type="checkbox"
                  [checked]="column?.defaultValue || false"
                  [disabled]="column?.disabled"
                  (change)="column.columnAction?.(item)"
                  class="w-4 h-4 text-blue-500 border-slate-300 rounded focus:ring-blue-500"
                />
              </ng-container>

              <!-- Default Text -->
              <ng-container *ngSwitchDefault>
                {{ column.value ? column.value(item) : '' }}
              </ng-container>
            </ng-container>
          </td>

          <!-- Action Column -->
          <td *ngIf="showActionColumn" class="px-5 py-3.5 whitespace-nowrap text-sm">
            <div class="flex items-center gap-2">
              <!-- View Button -->
              <button
                *ngIf="showViewButton"
                (click)="$event.stopPropagation(); viewClick.emit(item)"
                class="inline-flex items-center gap-1 px-2 py-1 rounded-md text-blue-600 hover:bg-blue-50 hover:text-blue-700 transition-colors text-xs font-medium"
              >
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                </svg>
                View
              </button>

              <!-- Edit Button -->
              <button
                *ngIf="showEditButton"
                (click)="$event.stopPropagation(); editClick.emit(item)"
                class="inline-flex items-center gap-1 px-2 py-1 rounded-md text-slate-600 hover:bg-slate-100 hover:text-slate-800 transition-colors text-xs font-medium"
              >
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                </svg>
                Edit
              </button>

              <!-- Delete Button -->
              <button
                *ngIf="showDeleteButton"
                (click)="$event.stopPropagation(); deleteClick.emit(item)"
                class="inline-flex items-center gap-1 px-2 py-1 rounded-md text-rose-600 hover:bg-rose-50 hover:text-rose-700 transition-colors text-xs font-medium"
              >
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                </svg>
                Delete
              </button>
            </div>
          </td>
        </tr>

        <!-- Empty State -->
        <tr *ngIf="data.length === 0 && !loading">
          <td [attr.colspan]="columns.length + (showIndex ? 1 : 0) + (showActionColumn ? 1 : 0)" class="px-6 py-16">
            <div class="flex flex-col items-center justify-center text-slate-500">
              <svg class="w-14 h-14 mb-3 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path>
              </svg>
              <p class="text-sm font-medium">{{ noDataMessage }}</p>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div *ngIf="showPagination && data.length > 0" class="bg-slate-50/60 px-5 py-3 border-t border-slate-100">
      <div class="flex items-center justify-between flex-wrap gap-4">

        <!-- Page Size Selector -->
        <div class="flex items-center space-x-2">
          <label class="text-sm text-slate-600">Show</label>
          <select
            [value]="pageSize"
            (change)="onPageSizeChange($event)"
            class="border border-slate-200 rounded-lg px-2.5 py-1 text-sm text-slate-700 focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 bg-white"
          >
            <option *ngFor="let size of pageSizeOptions" [value]="size">{{ size }}</option>
          </select>
          <span class="text-sm text-slate-600">entries</span>
        </div>

        <!-- Page Info -->
        <div class="text-sm text-slate-600">
          Showing <span class="font-medium">{{ startIndex }}</span> to <span class="font-medium">{{ endIndex }}</span> of <span class="font-medium">{{ total }}</span> results
        </div>

        <!-- Page Navigation -->
        <div class="flex items-center space-x-2">
          <!-- First Page -->
          <button
            (click)="onPageChange(1)"
            [disabled]="pageIndex === 1"
            class="px-2.5 py-1.5 border border-slate-200 rounded-lg text-sm font-medium text-slate-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed hover:bg-slate-100"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path>
            </svg>
          </button>

          <!-- Previous Page -->
          <button
            (click)="onPageChange(pageIndex - 1)"
            [disabled]="pageIndex === 1"
            class="px-2.5 py-1.5 border border-slate-200 rounded-lg text-sm font-medium text-slate-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed hover:bg-slate-100"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </svg>
          </button>

          <!-- Page Numbers -->
          <button
            *ngFor="let page of visiblePages"
            (click)="onPageChange(page)"
            [class.bg-blue-500]="page === pageIndex"
            [class.text-white]="page === pageIndex"
            [class.border-blue-500]="page === pageIndex"
            [class.hover:bg-slate-100]="page !== pageIndex"
            class="px-3 py-1.5 border border-slate-200 rounded-lg text-sm font-medium text-slate-700 transition-colors"
          >
            {{ page }}
          </button>

          <!-- Next Page -->
          <button
            (click)="onPageChange(pageIndex + 1)"
            [disabled]="pageIndex === totalPages"
            class="px-2.5 py-1.5 border border-slate-200 rounded-lg text-sm font-medium text-slate-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed hover:bg-slate-100"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
            </svg>
          </button>

          <!-- Last Page -->
          <button
            (click)="onPageChange(totalPages)"
            [disabled]="pageIndex === totalPages"
            class="px-2.5 py-1.5 border border-slate-200 rounded-lg text-sm font-medium text-slate-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed hover:bg-slate-100"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
