<div class="profile-picture-upload">
  <!-- Avatar Preview -->
  <div class="relative inline-block">
    <div [class]="getSizeClass() + ' rounded-full overflow-hidden border-4 border-gray-200 shadow-lg'">
      <img
        [src]="previewUrl || defaultAvatar"
        alt="Profile"
        class="w-full h-full object-cover"
      />

      <!-- Upload Progress Overlay -->
      <div *ngIf="isUploading" class="absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div class="text-center">
          <div class="w-12 h-12 border-4 border-white border-t-transparent rounded-full animate-spin mx-auto mb-2"></div>
          <p class="text-white text-sm">{{ uploadProgress }}%</p>
        </div>
      </div>
    </div>

    <!-- Upload/Change Button (hidden in view-only mode) -->
    <button
      *ngIf="!viewOnly"
      type="button"
      (click)="triggerFileInput()"
      [disabled]="isUploading"
      class="absolute bottom-0 right-0 bg-blue-500 hover:bg-blue-600 text-white p-3 rounded-full shadow-lg transition-all transform hover:scale-110 disabled:opacity-50 disabled:cursor-not-allowed"
      title="Upload Photo"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
      </svg>
    </button>

    <!-- Remove Button (only if not default and not view-only) -->
    <button
      *ngIf="!viewOnly && previewUrl !== defaultAvatar && !isUploading"
      type="button"
      (click)="removeImage()"
      class="absolute top-0 right-0 bg-red-600 hover:bg-red-700 text-white p-2 rounded-full shadow-lg transition-all transform hover:scale-110"
      title="Remove Photo"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
  </div>

  <!-- Hidden File Input (only when editable) -->
  <input
    *ngIf="!viewOnly"
    #fileInput
    type="file"
    accept="image/*"
    (change)="onFileSelected($event)"
    class="hidden"
  />

  <!-- Error Message -->
  <div *ngIf="errorMessage" class="mt-3 flex items-center text-red-600 text-sm">
    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
    </svg>
    {{ errorMessage }}
  </div>
</div>
