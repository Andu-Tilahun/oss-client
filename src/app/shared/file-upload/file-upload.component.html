<div class="file-upload-container">

  <!-- Preview Area for Images (Profile Picture Mode) -->
  <div *ngIf="showPreview && previewType === 'image'" class="image-preview-container">
    <ng-container *ngIf="currentFileMetadata as file">
      <div class="image-preview" *ngIf="file.presignedUrl && isImage(file.contentType)">
        <img [src]="file.presignedUrl" alt="Preview" class="preview-image" />
        <button
          *ngIf="!isUploading"
          (click)="removeFile()"
          class="remove-button"
          type="button">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
    </ng-container>

    <div *ngIf="!currentFileMetadata" class="placeholder-preview">
      <svg class="w-16 h-16 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
      </svg>
      <p class="text-gray-500 text-sm mt-2">No image uploaded</p>
    </div>
  </div>

  <!-- Preview Area for Documents -->
  <div *ngIf="showPreview && previewType === 'document'" class="document-preview">
    <ng-container *ngIf="currentFileMetadata as file">
      <div class="document-card">
      <!-- File Icon -->
      <div class="file-icon-wrapper">
        <!-- Image Icon -->
        <svg *ngIf="getFileIcon(file.contentType) === 'image'" class="file-icon text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
        </svg>

        <!-- PDF Icon -->
        <svg *ngIf="getFileIcon(file.contentType) === 'pdf'" class="file-icon text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
        </svg>

        <!-- Generic File Icon -->
        <svg *ngIf="getFileIcon(file.contentType) === 'file'" class="file-icon text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
        </svg>
      </div>

      <!-- File Info -->
      <div class="file-info">
        <p class="file-name">{{ file.originalFilename }}</p>
        <p class="file-size">{{ formatFileSize(file.fileSize) }}</p>
      </div>

      <!-- Actions -->
      <div class="file-actions">
        <button
          type="button"
          (click)="downloadFile()"
          class="action-button download"
          title="Download">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
          </svg>
        </button>
        <button
          type="button"
          *ngIf="!isUploading"
          (click)="removeFile()"
          class="action-button remove"
          title="Remove">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
          </svg>
        </button>
      </div>
    </div>
    </ng-container>
  </div>

  <!-- Upload Button -->
  <div class="upload-controls">
    <input
      #fileInput
      type="file"
      [accept]="accept"
      [multiple]="multiple"
      (change)="onFileSelected($event)"
      class="hidden" />

    <button
      type="button"
      (click)="triggerFileInput(fileInput)"
      [disabled]="isUploading"
      class="upload-button">
      <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
      </svg>
      {{ isUploading ? 'Uploading...' : label }}
    </button>
  </div>

  <!-- Progress Bar -->
  <div *ngIf="isUploading" class="progress-container">
    <div class="progress-bar">
      <div class="progress-fill" [style.width.%]="uploadProgress"></div>
    </div>
    <p class="text-sm text-gray-600 mt-1 text-center">{{ uploadProgress }}%</p>
  </div>

  <!-- Error Message -->
  <div *ngIf="errorMessage" class="error-message">
    <svg class="w-5 h-5 text-red-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
    </svg>
    <span class="text-red-600 text-sm">{{ errorMessage }}</span>
  </div>
</div>
