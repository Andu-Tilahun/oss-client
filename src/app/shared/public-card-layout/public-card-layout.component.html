<div class="w-full">
  <div class="mb-4 flex flex-wrap items-center gap-3">
    <div class="flex items-center gap-2 flex-shrink-0">
      <app-action-icon-button
        *ngIf="showRefreshButton"
        icon="refresh"
        title="Refresh"
        (click)="refreshClick.emit()"
      ></app-action-icon-button>
    </div>

    <div class="min-w-0 flex-1">
      <ng-content select="[extraHeader]"></ng-content>
    </div>
  </div>

  <div *ngIf="loading" class="relative min-h-[120px] rounded-3xl border border-white/60 bg-white/70">
    <div class="absolute inset-0 flex items-center justify-center">
      <div class="flex items-center space-x-2">
        <svg class="h-6 w-6 animate-spin text-emerald-600" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        <span class="text-sm text-slate-700">Loading...</span>
      </div>
    </div>
  </div>

  <div *ngIf="data.length === 0 && !loading" class="rounded-3xl border border-slate-200/80 bg-white/90 px-6 py-16 text-center text-slate-500">
    {{ noDataMessage }}
  </div>

  <div *ngIf="data.length > 0" class="grid grid-cols-1 gap-5 md:grid-cols-2 xl:grid-cols-3">
    <article
      class="public-card"
      *ngFor="let item of data; trackBy: trackByIndex"
      role="button"
      tabindex="0"
      (click)="primaryActionClick.emit(item)"
      (keydown.enter)="primaryActionClick.emit(item)"
      (keydown.space)="primaryActionClick.emit(item); $event.preventDefault()"
    >
      <div class="public-card__image-wrap">
        <img
          *ngIf="getImageUrl(item) as imageUrl; else fallbackImage"
          [src]="imageUrl"
          [alt]="imageAltAccessor(item)"
          class="public-card__image"
        />
        <ng-template #fallbackImage>
          <div class="public-card__image public-card__image--fallback"></div>
        </ng-template>
      </div>

      <div class="public-card__overlay">
        <div class="public-card__text">
          <h3>{{ titleAccessor(item) }}</h3>
          <p class="public-card__subtitle">{{ subtitleAccessor(item) }}</p>
          <p class="public-card__description">{{ descriptionAccessor(item) }}</p>
        </div>

        <div class="public-card__chips" *ngIf="badgesAccessor(item).length > 0">
          <span class="public-card__chip" *ngFor="let badge of badgesAccessor(item)">{{ badge }}</span>
        </div>

        <button type="button" class="public-card__cta" (click)="$event.stopPropagation(); primaryActionClick.emit(item)">
          {{ primaryActionLabel }}
        </button>

        <button
          *ngIf="showSecondaryAction"
          type="button"
          class="public-card__secondary"
          (click)="$event.stopPropagation(); secondaryActionClick.emit(item)"
        >
          {{ secondaryActionLabel }}
        </button>
      </div>
    </article>
  </div>

  <div *ngIf="showPagination && data.length > 0" class="mt-4 rounded-2xl border border-slate-100 bg-white/80 px-5 py-3">
    <div class="flex flex-wrap items-center justify-between gap-4">
      <div class="flex items-center space-x-2">
        <label class="text-sm text-slate-600">Show</label>
        <select
          [value]="pageSize"
          (change)="onPageSizeChange($event)"
          class="rounded-lg border border-slate-200 bg-white px-2.5 py-1 text-sm text-slate-700 focus:border-emerald-600 focus:ring-2 focus:ring-emerald-500/40"
        >
          <option *ngFor="let size of pageSizeOptions" [value]="size">{{ size }}</option>
        </select>
        <span class="text-sm text-slate-600">entries</span>
      </div>

      <div class="text-sm text-slate-600">
        Showing <span class="font-medium">{{ startIndex }}</span> to <span class="font-medium">{{ endIndex }}</span> of
        <span class="font-medium">{{ total }}</span> results
      </div>

      <div class="flex items-center space-x-2">
        <button
          (click)="onPageChange(pageIndex - 1)"
          [disabled]="pageIndex === 1"
          class="rounded-lg border border-slate-200 px-2.5 py-1.5 text-sm font-medium text-slate-700 transition-colors hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-50"
        >
          Prev
        </button>

        <button
          *ngFor="let page of visiblePages"
          (click)="onPageChange(page)"
          [class.bg-emerald-600]="page === pageIndex"
          [class.text-white]="page === pageIndex"
          [class.border-emerald-600]="page === pageIndex"
          [class.hover:bg-slate-100]="page !== pageIndex"
          class="rounded-lg border border-slate-200 px-3 py-1.5 text-sm font-medium text-slate-700 transition-colors"
        >
          {{ page }}
        </button>

        <button
          (click)="onPageChange(pageIndex + 1)"
          [disabled]="pageIndex === totalPages"
          class="rounded-lg border border-slate-200 px-2.5 py-1.5 text-sm font-medium text-slate-700 transition-colors hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-50"
        >
          Next
        </button>
      </div>
    </div>
  </div>
</div>
