<div class="dynamic-repeater">
  <!-- Header -->
  <div class="flex items-center justify-between mb-4">
    <div class="flex-1">
      <!-- Custom Header Template or Default Title -->
      <ng-container *ngIf="headerTemplate; else defaultHeader">
        <ng-container *ngTemplateOutlet="headerTemplate"></ng-container>
      </ng-container>
      <ng-template #defaultHeader>
        <h3 class="text-xl font-semibold text-gray-900">{{ title }}</h3>
      </ng-template>
    </div>

    <!-- Add Button -->
    <button
      *ngIf="showHeaderAddButton"
      type="button"
      (click)="onAdd()"
      [disabled]="!canAdd"
      class="inline-flex items-center px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      [title]="addButtonText"
    >
      <svg *ngIf="addButtonIcon" class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
      </svg>
      {{ addButtonText }}
    </button>
  </div>

  <!-- Items -->
  <div class="space-y-4">
    <div
      *ngFor="let item of items; let i = index"
      class="relative border border-gray-200 rounded-lg p-4 bg-gray-50 hover:bg-gray-100 transition-colors"
    >
      <!-- Index Badge (optional) -->
      <div *ngIf="showIndex" class="absolute top-2 left-2">
        <span class="inline-flex items-center justify-center w-8 h-8 bg-blue-500 text-white rounded-full text-sm font-semibold">
          {{ i + 1 }}
        </span>
      </div>

      <!-- Remove Button -->
      <button
        *ngIf="canRemove"
        type="button"
        (click)="onRemove(i)"
        class="absolute top-4 right-4 text-red-600 hover:text-red-800 transition-colors"
        title="Remove item"
      >
        <svg *ngIf="removeButtonIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
        </svg>
        <span *ngIf="!removeButtonIcon">Remove</span>
      </button>

      <!-- Item Content Template -->
      <div [class.pr-12]="canRemove" [class.pl-12]="showIndex">
        <ng-container
          *ngTemplateOutlet="itemTemplate; context: { $implicit: item, index: i }"
        ></ng-container>
      </div>
    </div>

    <!-- Empty State -->
    <div
      *ngIf="items.length === 0"
      class="text-center py-12 bg-gray-50 rounded-lg border-2 border-dashed border-gray-300"
    >
      <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
      </svg>
      <p class="mt-2 text-sm text-gray-600">{{ emptyStateText }}</p>
      <button
        *ngIf="showEmptyStateAddButton"
        type="button"
        (click)="onAdd()"
        [disabled]="!canAdd"
        class="mt-4 inline-flex items-center px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ addButtonText }}
      </button>
    </div>
  </div>

  <!-- Item Count Info -->
  <div *ngIf="items.length > 0" class="mt-2 text-sm text-gray-600">
    {{ items.length }} {{ items.length === 1 ? 'item' : 'items' }}
    <span *ngIf="maxItems"> (max {{ maxItems }})</span>
  </div>
</div>
