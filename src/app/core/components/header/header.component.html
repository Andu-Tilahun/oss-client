<header class="bg-white shadow-sm border-b border-gray-200">
  <div class="flex items-center justify-between px-6 py-4">

    <!-- Left: Page Title & Search -->
    <div class="flex items-center space-x-4 flex-1">

    </div>

    <!-- Right: Notifications & Profile -->
    <div class="flex items-center space-x-4">

      <!-- Notifications -->
      <button class="relative p-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
        </svg>
        <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
      </button>

      <!-- Profile Dropdown -->
      <div class="relative">
        <button
          (click)="toggleProfileMenu()"
          class="flex items-center space-x-3 p-2 hover:bg-gray-100 rounded-lg transition-colors"
        >
          <img
            *ngIf="currentUser$ | async as currentUser"
            [src]="userAvatar(currentUser)"
            [alt]="userName(currentUser)"
            class="w-10 h-10 rounded-full border-2 border-indigo-500"
          />
          <div class="hidden md:block text-left" *ngIf="currentUser$ | async as currentUser">
            <p class="text-sm font-semibold text-gray-800">{{ userName(currentUser) }}</p>
            <p class="text-xs text-gray-500">{{ userEmail(currentUser) }}</p>
          </div>
          <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>

        <!-- Dropdown Menu -->
        <div
          *ngIf="showProfileMenu"
          class="absolute right-0 mt-2 w-64 bg-white rounded-lg shadow-lg border border-gray-200 py-2 z-50"
        >
          <!-- User Info -->
          <div class="px-4 py-3 border-b border-gray-200" *ngIf="currentUser$ | async as currentUser">
            <p class="text-sm font-semibold text-gray-800">{{ userName(currentUser) }}</p>
            <p class="text-xs text-gray-500">{{ userEmail(currentUser) }}</p>
          </div>

          <button
            (click)="openEditProfile()"
            class="w-full flex items-center space-x-3 px-4 py-3 hover:bg-gray-50 transition-colors text-left">
            <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
            </svg>
            <span class="text-sm text-gray-700">Edit Profile</span>
          </button>

          <div class="border-t border-gray-200 my-2"></div>

          <button
            (click)="logout()"
            class="w-full flex items-center space-x-3 px-4 py-3 hover:bg-red-50 transition-colors text-left"
          >
            <svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
            <span class="text-sm text-red-600 font-medium">Logout</span>
          </button>
        </div>
      </div>
    </div>
  </div>
  <app-user-profile-modal
    *ngIf="currentUser$ | async as currentUser"
    [user]="currentUser"
    [(visible)]="showProfileEditModal"
    (userUpdated)="onUserUpdated()"
  ></app-user-profile-modal>
</header>
