<!-- Global Loading Spinner -->
<app-loading-spinner></app-loading-spinner>
<app-toast-container></app-toast-container>

<!-- Single router-outlet that persists - layout changes around it -->
<div class="font-sans" [class.flex]="showLayout" [class.h-screen]="showLayout" [class.bg-gray-100]="showLayout" [class.overflow-hidden]="showLayout">
  <!-- Sidebar (only for dashboard) -->
  <aside *ngIf="showLayout" class="flex-shrink-0">
    <app-sidebar></app-sidebar>
  </aside>

  <!-- Content area -->
  <div class="flex-1 flex flex-col" [class.overflow-hidden]="showLayout">
    <!-- Header (only for dashboard) -->
    <app-header *ngIf="showLayout"></app-header>

    <!-- Main Content - outlet always in same place -->
    <main [class.flex-1]="showLayout" [class.overflow-y-auto]="showLayout" [class.p-6]="showLayout">
      <router-outlet></router-outlet>
    </main>

    <!-- Footer (only for dashboard) -->
    <footer *ngIf="showLayout" class="bg-white border-t border-gray-200 px-6 py-4">
      <div class="flex items-center justify-between text-sm text-gray-600">
        <p>© 2025 Your Company. All rights reserved.</p>
        <div class="flex space-x-4">
          <a href="#" class="hover:text-indigo-600 transition-colors">Privacy Policy</a>
          <a href="#" class="hover:text-indigo-600 transition-colors">Terms of Service</a>
          <a href="#" class="hover:text-indigo-600 transition-colors">Contact</a>
        </div>
      </div>
    </footer>
  </div>
</div>
