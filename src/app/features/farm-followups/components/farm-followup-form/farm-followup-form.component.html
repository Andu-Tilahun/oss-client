<form [formGroup]="form" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">Remark</label>
    <textarea
      rows="4"
      formControlName="remark"
      placeholder="Write follow-up remark"
      class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
    ></textarea>
    <p *ngIf="form.get('remark')?.invalid && (form.get('remark')?.dirty || form.get('remark')?.touched)"
       class="text-xs text-red-600 mt-1">
      Remark is required.
    </p>
  </div>

  <div>
    <app-document-upload
      label="Attachment (optional)"
      [required]="false"
      (fileUploaded)="onFileUpload($event)"
      (fileRemoved)="onFileRemoved()"
    ></app-document-upload>
  </div>
</form>
