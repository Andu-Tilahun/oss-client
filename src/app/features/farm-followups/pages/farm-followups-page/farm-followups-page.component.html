<app-page-split-layout
  [showLeftTitle]="true"
  [showRightTitle]="true"
  leftTitle="Follow-ups"
  rightTitle="Follow-up detail"
  [rightItem]="selectedFollowUp"
  [rightEmptyMessage]="'Select a row to view details.'"
  [showRightEditButton]="false"
  [showRightCloseButton]="true"
  (rightClose)="onCloseDetail()"
>
  <ng-template #extraTableHeader>
    <div class="w-full p-4 bg-white rounded-xl border border-gray-100 space-y-3">
      <div class="flex flex-col md:flex-row gap-3 items-start md:items-end">
        <div class="w-full md:w-96">
          <label class="block text-sm font-medium text-gray-700 mb-1">External Id</label>
          <input
            type="text"
            [(ngModel)]="externalId"
            placeholder="UUID"
            class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div class="flex gap-2">
          <button class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700" (click)="onSearch()">
            Search
          </button>
          <button class="px-4 py-2 rounded-lg bg-gray-100 text-gray-800 hover:bg-gray-200" (click)="onRefresh()">
            Refresh
          </button>
          <button class="px-4 py-2 rounded-lg bg-green-600 text-white hover:bg-green-700" (click)="onAdd()">
            Create
          </button>
        </div>
      </div>
    </div>
  </ng-template>

  <ng-template #leftContent>
    <app-data-table
      [columns]="columns"
      [data]="followUps"
      [loading]="loading"
      [total]="followUps.length"
      [showPagination]="false"
      [showAddButton]="false"
      [showRefreshButton]="false"
      [showViewButton]="true"
      [showEditButton]="false"
      [showDeleteButton]="false"
      (viewClick)="openViewModal($event)"
      (rowClick)="onView($event)"
      [rowClickable]="true"
    ></app-data-table>
  </ng-template>

  <ng-template #rightContent let-item>
    <app-farm-followup-view [followUp]="item"></app-farm-followup-view>
  </ng-template>
</app-page-split-layout>

<app-farm-followup-create-modal
  [(visible)]="showCreateModal"
  [externalId]="externalId"
  (followUpCreated)="onFollowUpCreated()"
></app-farm-followup-create-modal>

<app-farm-followup-view-modal
  [(visible)]="showViewModal"
  [followUp]="selectedFollowUp"
></app-farm-followup-view-modal>
