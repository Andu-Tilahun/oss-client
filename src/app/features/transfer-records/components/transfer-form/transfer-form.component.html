<form [formGroup]="form" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">To Employee</label>
    <select
      formControlName="toEmployeeId"
      class="w-full border border-slate-300 rounded-md px-3 py-2 bg-white"
    >
      <option value="" disabled>Select employee</option>
      <option *ngFor="let e of employees" [value]="e.id">
        {{ e.employeeCode }} — {{ e.name }}
      </option>
    </select>
    <p
      *ngIf="form.get('toEmployeeId')?.touched && form.get('toEmployeeId')?.invalid"
      class="text-xs text-red-600 mt-1"
    >
      To employee is required.
    </p>
  </div>

  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Notes</label>
    <textarea
      formControlName="notes"
      rows="3"
      class="w-full border border-slate-300 rounded-md px-3 py-2 bg-white"
    ></textarea>
  </div>
</form>
