<app-detail-card>
  <div *ngIf="!investment" class="text-sm text-gray-500">No investment selected.</div>

  <ng-container *ngIf="investment">
    <div class="mb-8">
      <h3 class="text-2xl font-bold text-gray-900">Investment</h3>
    </div>

    <hr class="border-gray-200 mb-8"/>

    <app-detail-section title="Investment">
      <app-detail-field label="crowdFunding"
                        [value]="investment.crowdFunding?.title || investment.crowdFundingId || '-'"/>
      <app-detail-field label="Amount" [value]="formatAmount(investment.amount)"/>
      <app-detail-field label="Payment method" [value]="investment.paymentMethod || '-'"/>
      <app-detail-field label="Status" [value]="investment.status || '-'"/>
      <app-detail-field label="ROI" [value]="investment.roi || '-'"/>
    </app-detail-section>

<!--    <app-detail-section title="Farm Operation Follow-up History">-->
<!--      <div class="col-span-full">-->

<!--      </div>-->
<!--    </app-detail-section>-->
  </ng-container>
</app-detail-card>

<app-user-view *ngIf="investment" [user]="investment.investorUser"></app-user-view>
