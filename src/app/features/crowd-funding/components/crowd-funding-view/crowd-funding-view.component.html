<app-detail-card>
  <div *ngIf="!crowdFunding" class="text-sm text-gray-500">No campaign selected.</div>

  <ng-container *ngIf="crowdFunding">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-8">
      <div>
        <h3 class="text-2xl font-bold text-gray-900">{{ crowdFunding.title || 'Campaign' }}</h3>
      </div>

      <span
        class="inline-flex items-center rounded-full border px-3 py-1 text-xs font-medium"
        [ngClass]="statusPillClass(crowdFunding.fundingStatus)"
      >
        {{ crowdFunding.fundingStatus || '-' }}
      </span>
    </div>

    <hr class="border-gray-200 mb-8" />

    <app-detail-section title="Campaign">
      <app-detail-field label="Deadline" [value]="crowdFunding.fundingDeadline || '-'" />
      <app-detail-field label="Target" [value]="formatAmount(crowdFunding.targetAmount)" />
      <app-detail-field label="Minimum" [value]="formatAmount(crowdFunding.minimumContribution)" />
    </app-detail-section>

    <app-detail-section title="Farm operation">
      <app-detail-field label="Farm activity" [value]="crowdFunding.farmActivity ?? '-'" />
      <app-detail-field label="Water source" [value]="crowdFunding.waterSource ?? '-'" />
      <app-detail-field label="Operation start" [value]="crowdFunding.startDate ?? '-'" />
      <app-detail-field label="Operation end" [value]="crowdFunding.endDate ?? '-'" />
    </app-detail-section>

    <app-detail-section *ngIf="crowdFunding.description" title="Description">
      <div class="col-span-full text-sm text-slate-800 whitespace-pre-wrap">{{ crowdFunding.description }}</div>
    </app-detail-section>
  </ng-container>
</app-detail-card>
