<app-modal
  [(visible)]="visible"
  title="Create New Crowd Funding"
  size="lg"
  [confirmText]="'Create Crowdfunding'"
  [confirmLoading]="isLoading"
  (confirm)="onSubmit()"
  (cancel)="onCancel()"
  (visibleChange)="visibleChange.emit($event)"
>
  <ng-template #modalBody>
    <app-crowd-funding-form #crowdFundingForm mode="create"></app-crowd-funding-form>
  </ng-template>
</app-modal>
