<app-modal
  [(visible)]="visible"
  title="Set ROI"
  size="md"
  [maskClosable]="false"
  (visibleChange)="visibleChange.emit($event)"

  [(visible)]="visible"
  title="Set ROI"
  size="md"
  [confirmText]="'Set ROI'"
  [showCancelButton]="true"
  (confirm)="onSubmit()"
  (cancel)="onCancel()"
  (visibleChange)="visibleChange.emit($event)"
>
  <ng-template #modalBody>
    <div class="space-y-3">
      <form [formGroup]="form" class="space-y-2">
        <label class="block text-sm font-medium text-gray-700 mb-2">ROI terms</label>
        <textarea
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
          rows="4"
          formControlName="roi"
        ></textarea>
      </form>
    </div>
  </ng-template>
</app-modal>
