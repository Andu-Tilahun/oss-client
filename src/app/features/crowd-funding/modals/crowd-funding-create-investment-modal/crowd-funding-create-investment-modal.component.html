<app-modal
  [(visible)]="visible"
  title="Create Investment"
  size="md"
  [maskClosable]="false"
  (visibleChange)="visibleChange.emit($event)"
  [showCancelButton]="true"
  (confirm)="onSubmit()"
  (cancel)="onCancel()"
  (visibleChange)="visibleChange.emit($event)"
>
  <ng-template #modalBody>
    <div class="space-y-3">

      <form [formGroup]="form" class="space-y-2">
        <label class="block text-sm font-medium text-gray-700 mb-2">Amount</label>
        <input class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900" type="number" step="0.01" formControlName="amount"/>
        <select class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900" formControlName="paymentMethod">
          <option *ngFor="let m of paymentMethods" [value]="m">{{ m }}</option>
        </select>
      </form>
    </div>
  </ng-template>
</app-modal>
