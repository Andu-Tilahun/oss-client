<app-page-split-layout
  [showLeftTitle]="false"
  [showRightTitle]="false"
  leftTitle="Crowdfunding"
  rightTitle="crowdFunding Detail"
  [rightItem]="selectedcrowdFunding"
  [rightEmptyMessage]="'Select a row to view details.'"
  [showRightEditButton]="isAdmin"
  [rightActions]="rightActions"
  (rightEdit)="onEdit($event)"
>
  <ng-template #extraTableHeader>
    <div class="w-full">
      <app-farm-crowdfunding-crowdFunding-filter
        [(searchText)]="searchText"
        [(status)]="status"
        (filterChange)="onFilterChange()"
        (searchChange)="onFilterChange()"
        (clearFilters)="clearFilters()"
      ></app-farm-crowdfunding-crowdFunding-filter>

      <div class="px-3 py-2 text-xs text-slate-500">
        Tip: Investors are default-filtered to <b>OPEN</b> crowdFundings.
      </div>
    </div>
  </ng-template>

  <ng-template #leftContent>
    <app-data-table
      [columns]="columns"
      [data]="crowdFundings"
      [loading]="loading"
      [total]="total"
      [pageSize]="pageSize"
      [pageIndex]="pageIndex"
      [showAddButton]="isAdmin"
      [showRefreshButton]="true"
      [showViewButton]="true"
      [showEditButton]="isAdmin"
      [showDeleteButton]="false"
      [addButtonText]="'Create crowdFunding'"
      (pageChange)="onPageChange($event)"
      (addClick)="onAdd()"
      (refreshClick)="onRefresh()"
      (viewClick)="onView($event)"
      (editClick)="onEdit($event)"
    >
    </app-data-table>
  </ng-template>

  <ng-template #rightContent let-crowdFunding>
    <app-tabs
      [tabs]="tabs"
      [activeTab]="activeTab"
      (activeTabChange)="activeTab = $event">
      <!-- Request Tab -->
      <div *ngIf="activeTab === 'detail'">
        <app-crowd-funding-view
          [crowdFunding]="crowdFunding"
          [refreshKey]="detailRefreshKey"
        ></app-crowd-funding-view>
      </div>
      <div *ngIf="activeTab === 'farm-plot'">
        <app-farm-plot-view
          *ngIf="crowdFunding"
          [plot]="crowdFunding.farmPlot">
        </app-farm-plot-view>
      </div>
      <div *ngIf="activeTab === 'follow-up'">
        <app-farm-followup-list
          [followUps]="crowdFunding?.followUpDtoList ?? []"
          [externalId]="crowdFunding?.id ?? ''"
        ></app-farm-followup-list>
      </div>
    </app-tabs>
  </ng-template>
</app-page-split-layout>

<app-crowd-funding-create-modal
  [(visible)]="showCreatecrowdFundingModal"
  (crowdFundingCreated)="onCrowdFundingCreated()"
></app-crowd-funding-create-modal>

<app-crowd-funding-edit-modal
  [(visible)]="showEditcrowdFundingModal"
  [crowdFunding]="selectedcrowdFunding"
  (crowdFundingUpdated)="onCrowdFundingUpdated()"
></app-crowd-funding-edit-modal>

<app-crowd-funding-create-investment-modal
  [(visible)]="showCreateInvestmentModal"
  [crowdFunding]="selectedcrowdFunding"
  (investmentCreated)="onInvestmentCreated()"
></app-crowd-funding-create-investment-modal>

<app-extension-worker-assign-modal [(visible)]="showAssignExtenstionWorkerModal">
</app-extension-worker-assign-modal>
