<app-filter-bar
  [(searchText)]="searchText"
  (searchTextChange)="onSearchTextChange($event)"
  searchPlaceholder="Search by investment or crowdFunding ID (UUID)..."
  applyLabel="Search"
  clearLabel="Clear Filters"
  (searchChange)="onSearch()"
  (clearFilters)="onClearFilters()"
>
  <div class="flex items-center gap-2 flex-shrink-0 min-w-0">
    <label class="text-sm font-medium text-slate-600 whitespace-nowrap shrink-0" for="crowd-funding-investment-status">
      Status
    </label>
    <select
      id="crowd-funding-investment-status"
      [(ngModel)]="status"
      (ngModelChange)="onStatusChange($event)"
      class="min-w-[7rem] w-40 max-w-full px-3 py-1.5 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-slate-700 bg-white"
    >
      <option [ngValue]="''">All</option>
      <option *ngFor="let s of statuses" [ngValue]="s">{{ s }}</option>
    </select>
  </div>
</app-filter-bar>
