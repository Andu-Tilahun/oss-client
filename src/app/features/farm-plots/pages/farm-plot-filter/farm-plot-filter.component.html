<app-filter-bar
  [(searchText)]="searchText"
  (searchTextChange)="onSearchTextChange($event)"
  searchPlaceholder="Search farm plots..."
  applyLabel="Search"
  clearLabel="Clear Filters"
  (searchChange)="onSearch()"
  (clearFilters)="onClearFilters()"
>
  <!-- Status -->
  <div class="w-full">
    <label class="block text-xs font-medium text-slate-600 mb-1">Status</label>
    <select
      [(ngModel)]="status"
      (ngModelChange)="onStatusChange($event)"
      class="w-full px-3 py-1.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-slate-700"
    >
      <option [ngValue]="''">All</option>
      <option *ngFor="let s of statuses" [ngValue]="s" [disabled]="s === ''"> {{ s }} </option>
      <option value="" selected>All</option>
    </select>
  </div>

  <!-- Soil Type -->
  <div class="w-full">
    <label class="block text-xs font-medium text-slate-600 mb-1">Soil Type</label>
    <select
      [(ngModel)]="soilType"
      (ngModelChange)="onSoilTypeChange($event)"
      class="w-full px-3 py-1.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-slate-700"
    >
      <option [ngValue]="''">All</option>
      <option *ngFor="let s of soilTypes" [ngValue]="s" [disabled]="s === ''"> {{ s }} </option>
    </select>
  </div>

  <!-- Size Type -->
  <div class="w-full">
    <label class="block text-xs font-medium text-slate-600 mb-1">Size Type</label>
    <select
      [(ngModel)]="sizeType"
      (ngModelChange)="onSizeTypeChange($event)"
      class="w-full px-3 py-1.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-slate-700"
    >
      <option [ngValue]="''">All</option>
      <option *ngFor="let s of sizeTypes" [ngValue]="s" [disabled]="s === ''"> {{ s }} </option>
    </select>
  </div>
</app-filter-bar>
