<div class="filter-dropdown-container flex flex-col gap-3">
  <div class="filter-content flex items-center gap-4 flex-wrap">
    <!-- Search Input -->
    <div class="flex-1 min-w-[250px]">
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
            ></path>
          </svg>
        </div>
        <input
          type="search"
          [ngModel]="searchText"
          (ngModelChange)="onSearchTextChange($event)"
          (keyup.enter)="onSearch()"
          placeholder="Search farm plots..."
          class="block w-full pl-10 pr-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-slate-700"
        />
      </div>
    </div>

    <!-- Status -->
    <div class="min-w-[200px]">
      <label class="block text-xs font-medium text-slate-600 mb-2">Status</label>
      <select
        [(ngModel)]="status"
        (ngModelChange)="statusChange.emit($event)"
        class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-slate-700"
      >
        <option [ngValue]="''">All</option>
        <option *ngFor="let s of statuses" [ngValue]="s" [disabled]="s === ''"> {{ s }} </option>
        <option value="" selected>All</option>
      </select>
    </div>

    <!-- Soil Type -->
    <div class="min-w-[200px]">
      <label class="block text-xs font-medium text-slate-600 mb-2">Soil Type</label>
      <select
        [(ngModel)]="soilType"
        (ngModelChange)="soilTypeChange.emit($event)"
        class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-slate-700"
      >
        <option [ngValue]="''">All</option>
        <option *ngFor="let s of soilTypes" [ngValue]="s" [disabled]="s === ''"> {{ s }} </option>
      </select>
    </div>

    <!-- Size Type -->
    <div class="min-w-[200px]">
      <label class="block text-xs font-medium text-slate-600 mb-2">Size Type</label>
      <select
        [(ngModel)]="sizeType"
        (ngModelChange)="sizeTypeChange.emit($event)"
        class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-slate-700"
      >
        <option [ngValue]="''">All</option>
        <option *ngFor="let s of sizeTypes" [ngValue]="s" [disabled]="s === ''"> {{ s }} </option>
      </select>
    </div>

    <div class="flex gap-2">
      <button
        (click)="onSearch()"
        class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition-colors text-sm font-medium"
      >
        Search
      </button>
      <button
        (click)="onClearFilters()"
        class="px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors text-sm text-slate-700 font-medium"
      >
        Clear Filters
      </button>
    </div>
  </div>
</div>
