<div class="border-b border-slate-100">
  <div class="flex items-end gap-2 w-full overflow-x-auto scrollbar-hide">
    <div class="flex items-end gap-2 min-w-[360px]">
      <div class="w-full min-w-[180px]">
        <select
          [(ngModel)]="soilType"
          (ngModelChange)="onSoilTypeChange($event)"
          class="w-full px-3 py-1.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-slate-700"
        >
          <option [ngValue]="''">Soil Type All</option>
          <option *ngFor="let s of soilTypes" [ngValue]="s" [disabled]="s === ''"> {{ s }} </option>
        </select>
      </div>

      <div class="w-full min-w-[180px]">
        <select
          [(ngModel)]="sizeType"
          (ngModelChange)="onSizeTypeChange($event)"
          class="w-full px-3 py-1.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-slate-700"
        >
          <option [ngValue]="''">Size Type All</option>
          <option *ngFor="let s of sizeTypes" [ngValue]="s" [disabled]="s === ''"> {{ s }} </option>
        </select>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <button
        type="button"
        (click)="onClearFilters()"
        aria-label="Clear filters"
        title="Clear filters"
        class="flex-shrink-0 h-[34px] w-[34px] rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-100 transition-colors flex items-center justify-center"
      >
        <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M14.2 3.2a1 1 0 0 1 1.4 0l5.2 5.2a1 1 0 0 1 0 1.4l-1.1 1.1-6.6-6.6 1.1-1.1zM12.1 5.4l6.6 6.6-2.3 2.3-6.6-6.6 2.3-2.3zM3 18.2l5.4-5.4 6.6 6.6-1.9 1.9a1 1 0 0 1-.7.3H7.8a1 1 0 0 1-.5-.1l-4-2.3a.9.9 0 0 1-.3-1zM2.5 6.5a1.5 1.5 0 1 1 3 0 1.5 1.5 0 0 1-3 0zm1.8 4a2.2 2.2 0 1 1 4.4 0 2.2 2.2 0 0 1-4.4 0z"
          />
        </svg>
      </button>

      <button
        type="button"
        (click)="onSearch()"
        aria-label="Refresh plots"
        title="Refresh plots"
        class="flex-shrink-0 h-[34px] w-[34px] rounded-lg bg-blue-500 text-white hover:bg-blue-600 transition-colors flex items-center justify-center"
      >
        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 4v5h5M20 20v-5h-5M5.64 18.36A9 9 0 003.05 12c0-4.97 4.03-9 9-9 2.28 0 4.36.85 5.95 2.24L20 9M4 15l2.05 3.36A8.96 8.96 0 0012 21c2.28 0 4.36-.85 5.95-2.24L20 15"
          />
        </svg>
      </button>
    </div>
  </div>
</div>
