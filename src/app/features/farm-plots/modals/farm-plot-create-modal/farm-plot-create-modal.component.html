<app-modal
  [(visible)]="visible"
  title="Create Farm Plot"
  size="lg"
  [confirmText]="'Create Farm Plot'"
  [confirmLoading]="isLoading"
  [showCancelButton]="true"
  (confirm)="onSubmit()"
  (cancel)="onCancel()"
  (visibleChange)="visibleChange.emit($event)"
>
  <ng-template #modalBody>
    <app-farm-plot-form #farmPlotForm mode="create"></app-farm-plot-form>
  </ng-template>
</app-modal>
