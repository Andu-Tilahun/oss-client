<form [formGroup]="farmPlotForm" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Title <span class="text-red-500">*</span>
    </label>
    <input
      type="text"
      formControlName="title"
      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      [class.border-red-500]="farmPlotForm.get('title')?.invalid && farmPlotForm.get('title')?.touched"
    />
    <p *ngIf="farmPlotForm.get('title')?.invalid && farmPlotForm.get('title')?.touched" class="mt-1 text-sm text-red-600">
      Title is required
    </p>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Description
    </label>
    <textarea
      formControlName="description"
      rows="3"
      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
    ></textarea>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Size <span class="text-red-500">*</span>
      </label>
      <input
        type="number"
        formControlName="size"
        min="0"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        [class.border-red-500]="farmPlotForm.get('size')?.invalid && farmPlotForm.get('size')?.touched"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Size Type <span class="text-red-500">*</span>
      </label>
      <select
        formControlName="sizeType"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        [class.border-red-500]="farmPlotForm.get('sizeType')?.invalid && farmPlotForm.get('sizeType')?.touched"
      >
        <option value="">Select Size Type</option>
        <option *ngFor="let st of sizeTypes" [value]="st">{{ st }}</option>
      </select>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Latitude <span class="text-red-500">*</span>
      </label>
      <input
        type="number"
        formControlName="latitude"
        step="0.000001"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        [class.border-red-500]="farmPlotForm.get('latitude')?.invalid && farmPlotForm.get('latitude')?.touched"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Longitude <span class="text-red-500">*</span>
      </label>
      <input
        type="number"
        formControlName="longitude"
        step="0.000001"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        [class.border-red-500]="farmPlotForm.get('longitude')?.invalid && farmPlotForm.get('longitude')?.touched"
      />
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Soil Type <span class="text-red-500">*</span>
      </label>
      <select
        formControlName="soilType"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        [class.border-red-500]="farmPlotForm.get('soilType')?.invalid && farmPlotForm.get('soilType')?.touched"
      >
        <option value="">Select Soil Type</option>
        <option *ngFor="let st of soilTypes" [value]="st">{{ st }}</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Status <span class="text-red-500">*</span>
      </label>
      <select
        formControlName="status"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        [class.border-red-500]="farmPlotForm.get('status')?.invalid && farmPlotForm.get('status')?.touched"
      >
        <option value="">Select Status</option>
        <option *ngFor="let st of statuses" [value]="st">{{ st }}</option>
      </select>
    </div>
  </div>

  <div>
    <app-document-upload
      [currentFileId]="profileImageUuid"
      size="large"
      (fileUploaded)="onImageUploaded($event)"
      (fileRemoved)="onImageRemoved()"
    ></app-document-upload>
  </div>

  <div class="space-y-3">
    <div class="flex items-center justify-between">
      <label class="block text-sm font-medium text-gray-700">Gallery Images</label>
      <button
        type="button"
        class="rounded bg-blue-600 px-3 py-1 text-xs font-semibold text-white hover:bg-blue-700"
        (click)="addGallerySlot()"
      >
        Add Image
      </button>
    </div>

    <div *ngFor="let galleryImageId of galleryImageUuids; let i = index" class="rounded-lg border border-gray-200 p-3">
      <div class="mb-2 flex items-center justify-between">
        <span class="text-xs text-gray-600">Gallery Image {{ i + 1 }}</span>
        <button
          type="button"
          class="text-xs font-semibold text-rose-600 hover:text-rose-700"
          (click)="removeGallerySlot(i)"
        >
          Remove Slot
        </button>
      </div>
      <app-document-upload
        [label]="'Image ' + (i + 1)"
        [required]="false"
        [currentFileId]="galleryImageId"
        (fileUploaded)="onGalleryImageUploaded(i, $event)"
        (fileRemoved)="onGalleryImageRemoved(i)"
      ></app-document-upload>
    </div>
  </div>
</form>
