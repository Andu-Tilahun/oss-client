<app-detail-card>
  <div *ngIf="loading" class="animate-pulse space-y-8" aria-label="Loading farm plot">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
      <div class="space-y-2">
        <div class="h-7 w-64 rounded bg-gray-200"></div>
        <div class="h-4 w-80 rounded bg-gray-100"></div>
      </div>
      <div class="h-6 w-28 rounded-full bg-gray-200"></div>
    </div>

    <hr class="border-gray-200" />

    <div class="space-y-4">
      <div class="h-5 w-52 rounded bg-gray-200"></div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-2">
          <div class="h-3 w-24 rounded bg-gray-100"></div>
          <div class="h-4 w-40 rounded bg-gray-200"></div>
        </div>
        <div class="space-y-2">
          <div class="h-3 w-24 rounded bg-gray-100"></div>
          <div class="h-4 w-40 rounded bg-gray-200"></div>
        </div>
        <div class="space-y-2">
          <div class="h-3 w-24 rounded bg-gray-100"></div>
          <div class="h-4 w-40 rounded bg-gray-200"></div>
        </div>
        <div class="space-y-2">
          <div class="h-3 w-24 rounded bg-gray-100"></div>
          <div class="h-4 w-40 rounded bg-gray-200"></div>
        </div>
      </div>
    </div>

    <div class="space-y-4">
      <div class="h-5 w-20 rounded bg-gray-200"></div>
      <div class="h-28 w-full rounded bg-gray-100"></div>
    </div>

    <div class="space-y-4">
      <div class="h-5 w-28 rounded bg-gray-200"></div>
      <div class="h-[300px] w-full rounded bg-gray-100"></div>
    </div>
  </div>
  <div *ngIf="error && !loading" class="text-sm text-red-600">{{ error }}</div>
  <div *ngIf="!plot && !loading" class="text-sm text-gray-500">No farm plot selected.</div>

  <ng-container *ngIf="plot && !loading">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-8">
      <div>
        <h3 class="text-2xl font-bold text-gray-900">{{ plot.title }}</h3>
        <p *ngIf="plot.description" class="mt-1 text-sm text-gray-500">{{ plot.description }}</p>
      </div>

      <span
        class="inline-flex items-center rounded-full border px-3 py-1 text-xs font-medium"
        [ngClass]="statusPillClass(plot.status)"
      >
        {{ plot.status }}
      </span>
    </div>

    <hr class="border-gray-200 mb-8" />

    <app-detail-section title="Farm Plot Information">
      <!-- <app-detail-field label="Title" [value]="plot.title" /> -->
      <!-- <app-detail-field label="Status" [value]="plot.status" /> -->
      <app-detail-field
        label="Size"
        [value]="plot.size + ' ' + (plot.sizeType === 'HECTARES' ? 'H' : (plot.sizeType === 'ACRES' ? 'A' : plot.sizeType))"
      />
      <app-detail-field label="Soil Type" [value]="plot.soilType" />
      <app-detail-field label="Latitude" [value]="plot.latitude" />
      <app-detail-field label="Longitude" [value]="plot.longitude" />
      <!-- <app-detail-field label="Description" [value]="plot.description || '-'" /> -->
    </app-detail-section>

    <app-detail-section title="Media">
      <div class="col-span-full">
        <app-document-upload
          label="Image"
          [currentFileId]="plot.imageUuid"
          [viewOnly]="true"
          [required]="false"
        ></app-document-upload>
      </div>
    </app-detail-section>

    <app-detail-section title="Location Map">
      <div class="col-span-full">
        <app-oss-map
          [interactive]="false"
          [height]="'300px'"
          [zoom]="14"
          [latitude]="plot.latitude"
          [longitude]="plot.longitude"
          [locations]="[{ lat: plot.latitude, lng: plot.longitude, name: plot.title }]"
          [fitBounds]="true"
        ></app-oss-map>
      </div>
    </app-detail-section>
  </ng-container>

  <!-- fallback handled by the "No farm plot selected" block above -->
</app-detail-card>
