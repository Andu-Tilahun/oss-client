<form [formGroup]="employeeForm" class="space-y-4">
  <div class="flex gap-6">
    <div class="flex-shrink-0">
      <app-profile-picture-upload
        [currentFileId]="employeeForm.get('photoId')?.value"
        [viewOnly]="false"
        size="large"
        (fileUploaded)="onPhotoUploaded($event)"
        (fileRemoved)="onPhotoRemoved()"
      ></app-profile-picture-upload>
    </div>
    <div class="flex-1 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Name <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          formControlName="name"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          [class.border-red-500]="employeeForm.get('name')?.invalid && employeeForm.get('name')?.touched"
          placeholder="Full name"
        />
        <p *ngIf="employeeForm.get('name')?.invalid && employeeForm.get('name')?.touched" class="mt-1 text-sm text-red-600">
          Name is required
        </p>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Position</label>
        <input
          type="text"
          formControlName="position"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          placeholder="Job title"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Department</label>
        <select
          formControlName="departmentId"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        >
          <option value="">-- Select Department --</option>
          <option *ngFor="let d of departments" [value]="d.id">{{ d.name }}</option>
        </select>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Gender <span class="text-red-500">*</span>
          </label>
          <select
            formControlName="gender"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          >
            <option *ngFor="let g of genders" [value]="g">{{ g }}</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Age</label>
          <input
            type="number"
            formControlName="age"
            min="1"
            max="120"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
        <select
          formControlName="status"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        >
          <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
        </select>
      </div>
    </div>
  </div>
</form>
