<app-page-header
  pageTitle="Employee Details"
  subTitle="View employee information"
  [showBackButton]="true"
  [noCard]="true"
>
  <ng-template #mainContent>
    <div class="p-6">
      <div class="flex items-center justify-between gap-3 mb-6">
        <button
          (click)="openBorrowModal()"
          class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg text-sm font-medium transition-colors"
        >
          Borrow
        </button>
      </div>

      <app-employee-view [id]="employeeId"></app-employee-view>

      <div class="mt-8">
        <h3 class="text-sm font-semibold text-slate-700 mb-3">Borrowing History</h3>
        <app-borrow-records-list
          [employeeId]="employeeId"
          [records]="borrowRecords"
        ></app-borrow-records-list>
      </div>
    </div>
  </ng-template>
</app-page-header>

<app-borrow-create-modal
  [(visible)]="showBorrowModal"
  [employeeId]="employeeId"
  [availableItems]="availableItems"
  (borrowCreated)="onBorrowCreated()"
></app-borrow-create-modal>
