<form [formGroup]="form" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Replacement Item (Queue)</label>
    <select
      formControlName="newItemId"
      class="w-full border border-slate-300 rounded-md px-3 py-2 bg-white"
    >
      <option value="" disabled>Select replacement item</option>
      <option *ngFor="let i of queue" [value]="i.id">
        {{ i.serialNumber }} — {{ i.name || i.itemTypeName || 'Item' }} ({{ i.status }})
      </option>
    </select>
    <p
      *ngIf="form.get('newItemId')?.touched && form.get('newItemId')?.invalid"
      class="text-xs text-red-600 mt-1"
    >
      Replacement item is required.
    </p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Reason</label>
      <select
        formControlName="reason"
        class="w-full border border-slate-300 rounded-md px-3 py-2 bg-white"
      >
        <option *ngFor="let r of reasons" [value]="r">{{ r }}</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Old Item Final Status</label>
      <select
        formControlName="oldItemFinalStatus"
        class="w-full border border-slate-300 rounded-md px-3 py-2 bg-white"
      >
        <option value="Retired">Retired</option>
        <option value="Damaged">Damaged</option>
      </select>
    </div>
  </div>

  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Notes</label>
    <textarea
      formControlName="notes"
      rows="3"
      class="w-full border border-slate-300 rounded-md px-3 py-2 bg-white"
    ></textarea>
  </div>
</form>
