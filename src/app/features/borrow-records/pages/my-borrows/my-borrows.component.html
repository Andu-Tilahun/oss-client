<app-page-header
  pageTitle="My Borrows"
  subTitle="Items you have borrowed"
  [showBackButton]="false"
  [loading]="loading"
>
  <ng-template #mainContent>
    <div class="p-6">
      <p *ngIf="notLinked" class="text-amber-700 bg-amber-50 border border-amber-200 rounded-lg p-4">
        Your account is not linked to an employee. Please contact an administrator to link your user to an employee
        record.
      </p>
      <div *ngIf="!notLinked">
        <app-borrow-records-list [records]="records">
        </app-borrow-records-list>
      </div>
    </div>
  </ng-template>
</app-page-header>
