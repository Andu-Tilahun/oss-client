<form [formGroup]="form" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Item</label>
    <select
      formControlName="itemId"
      class="w-full border border-slate-300 rounded-md px-3 py-2 bg-white"
    >
      <option value="" disabled>Select available item</option>
      <option *ngFor="let i of availableItems" [value]="i.id">
        {{ i.serialNumber }} — {{ i.name || i.itemTypeName || 'Item' }} ({{ i.condition }})
      </option>
    </select>
    <p *ngIf="form.get('itemId')?.touched && form.get('itemId')?.invalid" class="text-xs text-red-600 mt-1">
      Item is required.
    </p>
  </div>

  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Condition at borrow</label>
    <select
      formControlName="conditionAtBorrow"
      class="w-full border border-slate-300 rounded-md px-3 py-2 bg-white"
    >
      <option *ngFor="let c of conditions" [value]="c">{{ c }}</option>
    </select>
  </div>
</form>
