<app-modal
  [(visible)]="visible"
  title="Edit Item"
  size="lg"
  confirmText="Update Item"
  [confirmLoading]="isLoading"
  (confirm)="onSubmit()"
  (cancel)="onCancel()"
  (visibleChange)="visibleChange.emit($event)"
>
  <ng-template #modalBody>
    <app-item-form #form mode="edit" [item]="item" [itemTypes]="itemTypes"></app-item-form>
  </ng-template>
</app-modal>
