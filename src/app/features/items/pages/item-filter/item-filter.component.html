<app-filter-bar
  [(searchText)]="searchText"
  (searchTextChange)="onSearchTextInput($event)"
  searchPlaceholder="Serial / Name"
  applyLabel="Apply"
  clearLabel="Clear"
  (searchChange)="onSearch()"
  (clearFilters)="onClearFilters()"
>
  <div class="filter-dropdown relative flex flex-wrap gap-2 items-center">
    <div class="relative">
      <button
        type="button"
        (click)="toggleItemTypeDropdown($event)"
        class="px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50 flex items-center gap-2 min-w-[140px] justify-between text-left"
      >
        <span class="text-sm text-slate-700">Type: {{ getSelectedItemTypeLabel() }}</span>
        <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
        </svg>
      </button>
      <div
        *ngIf="itemTypeDropdownOpen"
        class="absolute z-50 mt-1 w-56 bg-white rounded-lg shadow-lg border border-slate-200 py-2"
      >
        <button type="button" class="w-full text-left px-3 py-2 text-sm hover:bg-slate-50" (click)="selectItemType('')">
          All
        </button>
        <button
          *ngFor="let t of itemTypes"
          type="button"
          class="w-full text-left px-3 py-2 text-sm hover:bg-slate-50"
          (click)="selectItemType(t.id)"
        >
          {{ t.name }}
        </button>
      </div>
    </div>

    <div class="relative">
      <button
        type="button"
        (click)="toggleStatusDropdown($event)"
        class="px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50 flex items-center gap-2 min-w-[120px] justify-between text-left"
      >
        <span class="text-sm text-slate-700">Status: {{ getSelectedStatusesLabel() }}</span>
        <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
        </svg>
      </button>
      <div
        *ngIf="statusDropdownOpen"
        class="absolute z-50 mt-1 w-48 bg-white rounded-lg shadow-lg border border-slate-200 py-2 max-h-48 overflow-y-auto"
      >
        <label *ngFor="let s of statuses" class="flex items-center cursor-pointer hover:bg-slate-50 p-2">
          <input type="checkbox" [checked]="isStatusSelected(s)" (change)="toggleStatus(s)" class="w-4 h-4 text-blue-500 rounded" />
          <span class="ml-2 text-sm">{{ s }}</span>
        </label>
      </div>
    </div>

    <div class="relative">
      <button
        type="button"
        (click)="toggleConditionDropdown($event)"
        class="px-4 py-2 border border-slate-200 rounded-lg hover:bg-slate-50 flex items-center gap-2 min-w-[120px] justify-between text-left"
      >
        <span class="text-sm text-slate-700">Condition: {{ getSelectedConditionsLabel() }}</span>
        <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
        </svg>
      </button>
      <div
        *ngIf="conditionDropdownOpen"
        class="absolute z-50 mt-1 w-40 bg-white rounded-lg shadow-lg border border-slate-200 py-2"
      >
        <label *ngFor="let c of conditions" class="flex items-center cursor-pointer hover:bg-slate-50 p-2">
          <input type="checkbox" [checked]="isConditionSelected(c)" (change)="toggleCondition(c)" class="w-4 h-4 text-blue-500 rounded" />
          <span class="ml-2 text-sm">{{ c }}</span>
        </label>
      </div>
    </div>
  </div>
</app-filter-bar>
