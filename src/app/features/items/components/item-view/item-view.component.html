<app-detail-card>
  <div *ngIf="loading" class="text-sm text-gray-600">Loading item…</div>
  <div *ngIf="error && !loading" class="text-sm text-red-600">{{ error }}</div>
  <div *ngIf="!id && !loading" class="text-sm text-gray-500">No item selected.</div>

  <ng-container *ngIf="item && !loading">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-8">
      <h3 class="text-2xl font-bold text-gray-900">{{ item.serialNumber }}</h3>
      <span class="text-sm font-medium text-gray-600">{{ item.status }}</span>
    </div>

    <hr class="border-gray-200 mb-8" />

    <app-detail-section title="Item Information">
      <app-detail-field label="Serial Number" [value]="item.serialNumber" />
      <app-detail-field label="Name" [value]="item.name || '-'" />
      <app-detail-field label="Type" [value]="item.itemTypeName || '-'" />
      <app-detail-field label="Condition" [value]="item.condition" />
      <app-detail-field label="Status" [value]="item.status" />
      <app-detail-field label="Note" [value]="item.note || '-'" />
      <app-detail-field label="Purchase Date" [value]="item.purchaseDate || '-'" />
    </app-detail-section>
  </ng-container>
</app-detail-card>
