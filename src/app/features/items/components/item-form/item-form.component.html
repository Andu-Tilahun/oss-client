<form [formGroup]="form" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">Item Type <span class="text-red-500">*</span></label>
    <select formControlName="itemTypeId" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
      <option value="">Select type</option>
      <option *ngFor="let t of itemTypes" [value]="t.id">{{ t.name }}</option>
    </select>
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">Serial Number <span class="text-red-500">*</span></label>
    <input type="text" formControlName="serialNumber" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" />
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">Name</label>
    <input type="text" formControlName="name" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" />
  </div>
  <div class="grid grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Condition <span class="text-red-500">*</span></label>
      <select formControlName="condition" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
        <option *ngFor="let c of conditions" [value]="c">{{ c }}</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Status <span class="text-red-500">*</span></label>
      <select formControlName="status" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
        <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
      </select>
    </div>
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">Purchase Date</label>
    <input type="date" formControlName="purchaseDate" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" />
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">Note</label>
    <textarea formControlName="note" rows="3" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
  </div>
</form>
