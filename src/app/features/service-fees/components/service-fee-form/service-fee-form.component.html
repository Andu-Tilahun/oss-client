<form [formGroup]="form" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Payment Type <span class="text-red-500">*</span>
    </label>
    <select
      formControlName="paymentType"
      class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      [class.border-red-500]="form.get('paymentType')?.invalid && form.get('paymentType')?.touched"
    >
      <option value="">Select payment type</option>
      <option *ngFor="let opt of paymentTypeOptions" [value]="opt.value">
        {{ opt.label }}
      </option>
    </select>
    <p *ngIf="form.get('paymentType')?.invalid && form.get('paymentType')?.touched" class="mt-1 text-sm text-red-600">
      Payment type is required
    </p>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Amount <span class="text-red-500">*</span>
    </label>
    <input
      type="number"
      step="0.01"
      min="0.01"
      formControlName="amount"
      class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      [class.border-red-500]="form.get('amount')?.invalid && form.get('amount')?.touched"
    />
    <p *ngIf="form.get('amount')?.invalid && form.get('amount')?.touched" class="mt-1 text-sm text-red-600">
      Amount must be greater than 0
    </p>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Description
    </label>
    <input
      type="text"
      formControlName="description"
      class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      placeholder="Optional description"
    />
  </div>
</form>
