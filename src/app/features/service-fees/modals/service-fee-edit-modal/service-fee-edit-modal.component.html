<app-modal
  [(visible)]="visible"
  title="Edit Service Fee"
  size="md"
  [confirmText]="'Update Service Fee'"
  [confirmLoading]="isLoading"
  (confirm)="onSubmit()"
  (cancel)="onCancel()"
  (visibleChange)="visibleChange.emit($event)"
>
  <ng-template #modalBody>
    <app-service-fee-form
      #serviceFeeForm
      mode="edit"
      [serviceFee]="serviceFee"
    ></app-service-fee-form>
  </ng-template>
</app-modal>
