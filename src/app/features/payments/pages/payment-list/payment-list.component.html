<app-page-header
  pageTitle="Payments"
  subTitle="View payment details"
  [showBackButton]="false"
  [loading]="loading"
>
  <ng-template #mainContent>
    <div class="p-6">
      <h2 class="text-base font-semibold text-slate-700 mb-4">Payment list</h2>
      <app-data-table
        [columns]="columns"
        [data]="payments"
        [loading]="loading"
        [total]="total"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [showIndex]="true"
        [showAddButton]="false"
        [showRefreshButton]="true"
        [showViewButton]="true"
        [showEditButton]="false"
        [showDeleteButton]="false"
        (pageChange)="onPageChange($event)"
        (refreshClick)="loadPayments()"
        (viewClick)="onView($event)"
      >
        <div extraTableHeader class="w-full flex justify-end">
          <app-payment-filter
            [(status)]="status"
            (searchChange)="onSearch()"
            (clearFilters)="clearFilters()"
          ></app-payment-filter>
        </div>
      </app-data-table>
    </div>
  </ng-template>
</app-page-header>
