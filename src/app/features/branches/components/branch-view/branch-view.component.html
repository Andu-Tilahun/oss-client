<app-detail-card>
  <div *ngIf="loading" class="text-sm text-gray-600">Loading branch…</div>
  <div *ngIf="error && !loading" class="text-sm text-red-600">{{ error }}</div>
  <div *ngIf="!id && !loading" class="text-sm text-gray-500">No branch selected.</div>

  <ng-container *ngIf="branch && !loading">

    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-8">
      <h3 class="text-2xl font-bold text-gray-900">{{ branch.branchName }}</h3>
      <span *ngIf="branch.isMainBranch" class="text-sm font-medium text-blue-600">Main Branch</span>
    </div>

    <hr class="border-gray-200 mb-8" />

    <app-detail-section title="Branch Information">
      <app-detail-field label="Name" [value]="branch.branchName" />
      <app-detail-field label="Main Branch" [value]="branch.isMainBranch ? 'Yes' : 'No'" />
    </app-detail-section>

  </ng-container>
</app-detail-card>
