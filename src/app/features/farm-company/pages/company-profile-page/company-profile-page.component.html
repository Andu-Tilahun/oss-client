<app-page-split-layout
  [showLeftTitle]="true"
  [showRightTitle]="true"
  leftTitle="Company Management"
  rightTitle="Company Detail"
  [rightItem]="companyProfile"
  [showRightEditButton]="false"
  [rightEmptyMessage]="'Company profile is not available.'"
>
  <ng-template #leftContent>
    <div class="bg-white border border-gray-200 rounded-xl p-6">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-base font-semibold text-gray-900">Edit Company Profile</h3>
        <button
          type="button"
          class="inline-flex items-center px-4 py-2 rounded-lg text-white bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
          [disabled]="saving || loading"
          (click)="onSave()"
        >
          {{ saving ? 'Saving...' : 'Save Changes' }}
        </button>
      </div>
      <app-company-profile-form
        #companyForm
        [companyProfile]="companyProfile"
        [loading]="loading"
      ></app-company-profile-form>
    </div>
  </ng-template>

  <ng-template #rightContent>
    <app-company-profile-view
      [companyProfile]="companyProfile"
      [loading]="loading"
    ></app-company-profile-view>
  </ng-template>
</app-page-split-layout>
