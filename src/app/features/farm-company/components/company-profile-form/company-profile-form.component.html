<form [formGroup]="companyProfileForm" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Company Name <span class="text-red-500">*</span>
    </label>
    <input
      type="text"
      formControlName="name"
      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      [class.border-red-500]="companyProfileForm.get('name')?.invalid && companyProfileForm.get('name')?.touched"
    />
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Latitude <span class="text-red-500">*</span>
      </label>
      <input
        type="number"
        formControlName="latitude"
        step="0.000001"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        [class.border-red-500]="companyProfileForm.get('latitude')?.invalid && companyProfileForm.get('latitude')?.touched"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Longitude <span class="text-red-500">*</span>
      </label>
      <input
        type="number"
        formControlName="longitude"
        step="0.000001"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        [class.border-red-500]="companyProfileForm.get('longitude')?.invalid && companyProfileForm.get('longitude')?.touched"
      />
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Contact Mobile Phone <span class="text-red-500">*</span>
      </label>
      <input
        type="text"
        formControlName="contactMobilePhone"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        [class.border-red-500]="companyProfileForm.get('contactMobilePhone')?.invalid && companyProfileForm.get('contactMobilePhone')?.touched"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Office Phone <span class="text-red-500">*</span>
      </label>
      <input
        type="text"
        formControlName="officePhone"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        [class.border-red-500]="companyProfileForm.get('officePhone')?.invalid && companyProfileForm.get('officePhone')?.touched"
      />
    </div>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Email <span class="text-red-500">*</span>
    </label>
    <input
      type="email"
      formControlName="email"
      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      [class.border-red-500]="companyProfileForm.get('email')?.invalid && companyProfileForm.get('email')?.touched"
    />
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Bank Account <span class="text-red-500">*</span>
    </label>
    <input
      type="text"
      formControlName="bankAccount"
      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      [class.border-red-500]="companyProfileForm.get('bankAccount')?.invalid && companyProfileForm.get('bankAccount')?.touched"
    />
  </div>
</form>
