<form [formGroup]="form" class="space-y-6">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Title <span class="text-red-500">*</span>
    </label>
    <input
      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
      [class.border-red-500]="form.get('title')?.invalid && form.get('title')?.touched"
      type="text"
      formControlName="title"
      [disabled]="disabled"
    />
    <div class="text-xs text-red-600 mt-1" *ngIf="form.get('title')?.touched && form.get('title')?.invalid">
      Title is required (max 100 chars)
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Target amount <span class="text-red-500">*</span>
      </label>
      <input
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
        [class.border-red-500]="form.get('targetAmount')?.invalid && form.get('targetAmount')?.touched"
        type="number"
        step="0.01"
        formControlName="targetAmount"
        [disabled]="disabled"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Minimum contribution <span class="text-red-500">*</span>
      </label>
      <input
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
        [class.border-red-500]="form.get('minimumContribution')?.invalid && form.get('minimumContribution')?.touched"
        type="number"
        step="0.01"
        formControlName="minimumContribution"
        [disabled]="disabled"
      />
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Funding deadline <span class="text-red-500">*</span>
      </label>
      <input
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
        [class.border-red-500]="form.get('fundingDeadline')?.invalid && form.get('fundingDeadline')?.touched"
        type="datetime-local"
        formControlName="fundingDeadline"
        [disabled]="disabled"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
      <select
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900 bg-white"
        formControlName="fundingStatus"
        [disabled]="disabled"
      >
        <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
      </select>
    </div>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
    <textarea
      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
      rows="4"
      formControlName="description"
      [disabled]="disabled"
    ></textarea>
  </div>
</form>
