<app-page-header
  pageTitle="Item Type Management"
  subTitle="Manage asset classification catalog"
  [showBackButton]="false"
  [loading]="loading"
>
  <ng-template #mainContent>
    <div class="p-6">
      <h2 class="text-base font-semibold text-slate-700 mb-4">Item type lists</h2>

      <app-data-table
        [columns]="columns"
        [data]="displayedItems"
        [loading]="loading"
        [total]="total"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [showIndex]="true"
        [showAddButton]="true"
        [showRefreshButton]="true"
        [showViewButton]="true"
        [showEditButton]="true"
        [showDeleteButton]="true"
        addButtonText="Add Item Type"
        (pageChange)="onPageChange($event)"
        (addClick)="onAdd()"
        (refreshClick)="onRefresh()"
        (viewClick)="onView($event)"
        (editClick)="onEdit($event)"
        (deleteClick)="onDelete($event)"
      >
        <div extraTableHeader class="w-full flex justify-end">
          <app-item-type-filter
            [(searchText)]="searchText"
            (searchChange)="onSearch()"
            (clearFilters)="clearFilters()"
          ></app-item-type-filter>
        </div>
      </app-data-table>
    </div>
  </ng-template>
</app-page-header>

<app-item-type-create-modal
  [(visible)]="showCreateModal"
  (itemTypeCreated)="onItemTypeCreated()"
></app-item-type-create-modal>

<app-item-type-edit-modal
  [(visible)]="showEditModal"
  [itemType]="selectedItemType"
  (itemTypeUpdated)="onItemTypeUpdated()"
></app-item-type-edit-modal>

<app-confirmation-modal
  [(visible)]="showDeleteModal"
  title="Delete Item Type"
  message="Are you sure you want to delete this item type?"
  confirmText="Delete"
  (confirm)="confirmDelete()"
></app-confirmation-modal>
