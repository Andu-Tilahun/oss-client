<app-detail-card>
  <div *ngIf="loading" class="text-sm text-gray-600">Loading item type…</div>
  <div *ngIf="error && !loading" class="text-sm text-red-600">{{ error }}</div>
  <div *ngIf="!id && !loading" class="text-sm text-gray-500">No item type selected.</div>

  <ng-container *ngIf="itemType && !loading">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-8">
      <h3 class="text-2xl font-bold text-gray-900">{{ itemType.name }}</h3>
      <span class="text-sm font-medium text-gray-600">{{ itemType.category || '-' }}</span>
    </div>

    <hr class="border-gray-200 mb-8" />

    <app-detail-section title="Item Type Information">
      <app-detail-field label="Name" [value]="itemType.name" />
      <app-detail-field label="Category" [value]="itemType.category || '-'" />
      <app-detail-field label="Gate Tracked" [value]="itemType.gateTracked ? 'Yes' : 'No'" />
    </app-detail-section>
  </ng-container>
</app-detail-card>
