<app-page-header
  pageTitle="User Details"
  subTitle="View and manage user information"
  [showBackButton]="true"
  [loading]="loading"
  (back)="goBack()"
>
  <ng-template #mainContent>
    <div class="p-6">
      <app-detail-card>
        <div *ngIf="loading" class="text-sm text-gray-600">Loading user…</div>
        <div *ngIf="!user?.id && !loading" class="text-sm text-gray-500">No user selected.</div>

        <ng-container *ngIf="user?.id && !loading">

          <!-- Header -->
          <div class="flex flex-col md:flex-row md:items-center gap-6 mb-8">
            <img
              [src]="user.profileUrl || 'https://ui-avatars.com/api/?name=' + user.firstName + '+' + user.lastName"
              [alt]="user.username"
              class="w-24 h-24 rounded-full object-cover border-2 border-gray-200"
            />
            <div class="flex-1">
              <h3 class="text-2xl font-bold text-gray-900">
                {{ user.firstName }} {{ user.middleName }} {{ user.lastName }}
              </h3>
              <p class="text-gray-600 mt-1">{{ user.username }}</p>
              <span [class]="user.accountNonLocked ? 'text-green-600 font-medium' : 'text-red-600 font-medium'">
                {{ user.accountNonLocked ? 'Active' : 'Locked' }}
              </span>
            </div>
          </div>

          <hr class="border-gray-200 mb-8" />

          <app-detail-section title="Personal Information">
            <app-detail-field label="First Name" [value]="user.firstName" />
            <app-detail-field label="Middle Name" [value]="user.middleName" />
            <app-detail-field label="Last Name" [value]="user.lastName" />
            <app-detail-field label="Email" [value]="user.email" />
            <app-detail-field label="Gender" [value]="user.gender" />
          </app-detail-section>

          <app-detail-section title="Account">
            <app-detail-field label="Username" [value]="user.username" />
            <app-detail-field label="Role" [value]="user.role" />
            <app-detail-field label="Status" [value]="user.accountNonLocked ? 'Active' : 'Locked'" />
          </app-detail-section>

          <app-detail-section title="Record">
            <app-detail-field label="Created At" [value]="user.createdAt ? (user.createdAt | date:'medium') : '-'" />
            <app-detail-field label="Updated At" [value]="user.updatedAt ? (user.updatedAt | date:'medium') : '-'" />
          </app-detail-section>

        </ng-container>
      </app-detail-card>
    </div>
  </ng-template>
</app-page-header>
