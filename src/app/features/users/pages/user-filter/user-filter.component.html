<app-filter-bar
  [(searchText)]="searchText"
  (searchTextChange)="onSearchTextChange($event)"
  searchPlaceholder="Search users..."
  applyLabel="Search"
  clearLabel="Clear Filters"
  (searchChange)="onSearch()"
  (clearFilters)="onClearFilters()"
>
  <div class="w-[150px]">
    <select
      [ngModel]="selectedRole"
      (ngModelChange)="onRoleSelectionChange($event)"
      class="w-full px-3 py-1.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-slate-700"
    >
      <option value="">Role: All</option>
      <option *ngFor="let role of roleFilters" [value]="role.value">
        Role: {{ role.label }}
      </option>
    </select>
  </div>

  <div class="w-[150px]">
    <select
      [ngModel]="selectedGender"
      (ngModelChange)="onGenderSelectionChange($event)"
      class="w-full px-3 py-1.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 text-slate-700"
    >
      <option value="">Gender: All</option>
      <option *ngFor="let gender of genderFilters" [value]="gender.value">
        Gender: {{ gender.label }}
      </option>
    </select>
  </div>
</app-filter-bar>
