<form [formGroup]="userForm" class="space-y-4">
  <div class="grid grid-cols-2 gap-4">
    <!-- First Name -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        First Name <span class="text-red-500">*</span>
      </label>
      <input
        type="text"
        formControlName="firstName"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        [class.border-red-500]="userForm.get('firstName')?.invalid && userForm.get('firstName')?.touched"
      />
      <p *ngIf="userForm.get('firstName')?.invalid && userForm.get('firstName')?.touched" class="mt-1 text-sm text-red-600">
        First name is required
      </p>
    </div>

    <!-- Last Name -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Last Name <span class="text-red-500">*</span>
      </label>
      <input
        type="text"
        formControlName="lastName"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        [class.border-red-500]="userForm.get('lastName')?.invalid && userForm.get('lastName')?.touched"
      />
      <p *ngIf="userForm.get('lastName')?.invalid && userForm.get('lastName')?.touched" class="mt-1 text-sm text-red-600">
        Last name is required
      </p>
    </div>
  </div>

  <!-- Middle Name -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">Middle Name</label>
    <input
      type="text"
      formControlName="middleName"
      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
    />
  </div>

  <div class="grid grid-cols-2 gap-4">
    <!-- Username -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Username <span class="text-red-500">*</span>
      </label>
      <input
        type="text"
        formControlName="username"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        [class.border-red-500]="userForm.get('username')?.invalid && userForm.get('username')?.touched"
        [class.bg-gray-100]="mode === 'edit'"
      />
      <p *ngIf="userForm.get('username')?.invalid && userForm.get('username')?.touched" class="mt-1 text-sm text-red-600">
        Username is required (min 3 characters)
      </p>
      <p *ngIf="mode === 'edit'" class="mt-1 text-xs text-gray-500">
        Username cannot be changed
      </p>
    </div>

    <!-- Email -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Email <span class="text-red-500">*</span>
      </label>
      <input
        type="email"
        formControlName="email"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        [class.border-red-500]="userForm.get('email')?.invalid && userForm.get('email')?.touched"
      />
      <p *ngIf="userForm.get('email')?.invalid && userForm.get('email')?.touched" class="mt-1 text-sm text-red-600">
        Valid email is required
      </p>
    </div>
  </div>

  <!-- Role (create mode only) -->
  <div *ngIf="mode === 'create'">
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Role <span class="text-red-500">*</span>
    </label>
    <select
      formControlName="roleId"
      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      [class.border-red-500]="userForm.get('roleId')?.invalid && userForm.get('roleId')?.touched"
    >
      <option value="">Select Role</option>
      <option *ngFor="let role of roles" [value]="role.id">
        {{ role.roleName }}
      </option>
    </select>
    <p *ngIf="userForm.get('roleId')?.invalid && userForm.get('roleId')?.touched" class="mt-1 text-sm text-red-600">
      Role is required
    </p>
  </div>

  <!-- Employee (when role is Employee) -->
  <div *ngIf="showEmployeeField">
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Employee <span class="text-red-500">*</span>
    </label>
    <select
      formControlName="employeeId"
      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      [class.border-red-500]="userForm.get('employeeId')?.invalid && userForm.get('employeeId')?.touched"
    >
      <option value="">Select Employee</option>
      <option *ngFor="let emp of employees" [value]="emp.id">
        {{ emp.employeeCode }} – {{ emp.name }}
      </option>
    </select>
    <p *ngIf="userForm.get('employeeId')?.invalid && userForm.get('employeeId')?.touched" class="mt-1 text-sm text-red-600">
      Employee is required for Employee role
    </p>
  </div>


  <!-- Password (only in create mode) -->
  <div *ngIf="showPasswordField">
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Password <span class="text-red-500">*</span>
    </label>
    <input
      type="password"
      formControlName="password"
      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      [class.border-red-500]="userForm.get('password')?.invalid && userForm.get('password')?.touched"
    />
    <p *ngIf="userForm.get('password')?.invalid && userForm.get('password')?.touched" class="mt-1 text-sm text-red-600">
      Password is required (min 6 characters)
    </p>
  </div>

  <!-- Gender -->
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Gender <span class="text-red-500">*</span>
    </label>
    <select
      formControlName="gender"
      class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      [class.border-red-500]="userForm.get('gender')?.invalid && userForm.get('gender')?.touched"
    >
      <option value="">Select Gender</option>
      <option value="Male">Male</option>
      <option value="Female">Female</option>
      <option value="Other">Other</option>
    </select>
    <p *ngIf="userForm.get('gender')?.invalid && userForm.get('gender')?.touched" class="mt-1 text-sm text-red-600">
      Gender is required
    </p>
  </div>

  <!-- Profile Image Upload -->
  <div *ngIf="profileUpdate && user as u">
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Profile Image
    </label>

    <app-profile-picture-upload
      [currentFileId]="u.profileImageUuid"
      size="large"
      (fileUploaded)="onProfilePictureUploaded($event)"
      (fileRemoved)="onProfilePictureRemoved()"
    ></app-profile-picture-upload>
  </div>
</form>
