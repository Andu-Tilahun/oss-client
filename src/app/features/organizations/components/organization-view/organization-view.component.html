<app-detail-card>
  <div *ngIf="loading" class="text-sm text-gray-600">Loading organization…</div>
  <div *ngIf="error && !loading" class="text-sm text-red-600">{{ error }}</div>
  <div *ngIf="!id && !loading" class="text-sm text-gray-500">No organization selected.</div>

  <ng-container *ngIf="organization && !loading">

    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-8">
      <h3 class="text-2xl font-bold text-gray-900">{{ organization.name }}</h3>
      <span class="text-sm font-medium text-gray-600">{{ organization.organizationType }}</span>
    </div>

    <hr class="border-gray-200 mb-8" />

    <app-detail-section title="Organization Information">
      <app-detail-field label="Name" [value]="organization.name" />
      <app-detail-field label="Type" [value]="organization.organizationType" />
    </app-detail-section>

  </ng-container>
</app-detail-card>
