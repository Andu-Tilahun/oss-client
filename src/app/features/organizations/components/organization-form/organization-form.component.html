<form [formGroup]="organizationForm" class="space-y-4">
  <div class="grid grid-cols-1 gap-4">
    <!-- Name -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Name <span class="text-red-500">*</span>
      </label>
      <input
        type="text"
        formControlName="name"
        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        [class.border-red-500]="organizationForm.get('name')?.invalid && organizationForm.get('name')?.touched"
      />
      <p *ngIf="organizationForm.get('name')?.invalid && organizationForm.get('name')?.touched" class="mt-1 text-sm text-red-600">
        Name is required
      </p>
    </div>

    <!-- Type -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Type <span class="text-red-500">*</span>
      </label>
      <select
        formControlName="organizationType"
        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        [class.border-red-500]="organizationForm.get('organizationType')?.invalid && organizationForm.get('organizationType')?.touched"
      >
        <option value="" disabled>Select type</option>
        <option *ngFor="let type of organizationTypes" [value]="type.value">
          {{ type.label }}
        </option>
      </select>
      <p *ngIf="organizationForm.get('organizationType')?.invalid && organizationForm.get('organizationType')?.touched" class="mt-1 text-sm text-red-600">
        Type is required
      </p>
    </div>
  </div>
</form>
