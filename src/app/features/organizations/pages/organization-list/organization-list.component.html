<app-page-header
  pageTitle="Organization Management"
  subTitle="list organization information"
  [showBackButton]="false"
  [loading]="loading"
>
  <ng-template #mainContent>
    <div class="p-6">
      <h2 class="text-base font-semibold text-slate-700 mb-4">Organization lists</h2>
      <app-data-table
        [columns]="columns"
        [data]="organizations"
        [loading]="loading"
        [total]="total"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [showIndex]="true"
        [showAddButton]="true"
        [showRefreshButton]="true"
        [showViewButton]="true"
        [showEditButton]="true"
        [showDeleteButton]="true"
        (pageChange)="onPageChange($event)"
        (addClick)="onAdd()"
        (refreshClick)="onRefresh()"
        (viewClick)="onView($event)"
        (editClick)="onEdit($event)"
        (deleteClick)="onDelete($event)"
      >
        <div extraTableHeader class="w-full flex justify-end">
          <app-organization-filter
            [(searchText)]="searchText"
            [(selectedTypes)]="selectedTypes"
            (filterChange)="onFilterChange()"
            (searchChange)="onSearch()"
            (clearFilters)="clearFilters()"
          ></app-organization-filter>
        </div>
      </app-data-table>
    </div>
  </ng-template>
</app-page-header>

<!-- Create Organization Modal -->
<app-organization-create-modal
  [(visible)]="showCreateModal"
  (organizationCreated)="onOrganizationCreated()"
></app-organization-create-modal>

<!-- Edit Organization Modal -->
<app-organization-edit-modal
  [(visible)]="showEditModal"
  [organization]="selectedOrganization"
  (organizationUpdated)="onOrganizationUpdated()"
></app-organization-edit-modal>

<!-- Delete Confirmation Modal -->
<app-confirmation-modal
  [(visible)]="showDeleteModal"
  title="Delete Organization"
  message="Are you sure you want to delete this organization?"
  confirmText="Delete"
  (confirm)="confirmDelete()"
></app-confirmation-modal>
