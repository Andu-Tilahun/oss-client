<form [formGroup]="woredaForm" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Name <span class="text-red-500">*</span>
    </label>
    <input
      type="text"
      formControlName="name"
      class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      [class.border-red-500]="woredaForm.get('name')?.invalid && woredaForm.get('name')?.touched"
    />
    <p *ngIf="woredaForm.get('name')?.invalid && woredaForm.get('name')?.touched" class="mt-1 text-sm text-red-600">
      Name is required
    </p>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Subcity/Zone <span class="text-red-500">*</span>
    </label>
    <select
      formControlName="subcityId"
      class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      [class.border-red-500]="woredaForm.get('subcityId')?.invalid && woredaForm.get('subcityId')?.touched"
    >
      <option value="">Select Subcity/Zone</option>
      <option *ngFor="let subcity of subcities" [value]="subcity.id">
        {{ subcity.name }} ({{ subcity.regionName }})
      </option>
    </select>
    <p *ngIf="woredaForm.get('subcityId')?.invalid && woredaForm.get('subcityId')?.touched" class="mt-1 text-sm text-red-600">
      Subcity/Zone is required
    </p>
  </div>
</form>
