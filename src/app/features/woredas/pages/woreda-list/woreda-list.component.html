<app-page-header
  pageTitle="Woreda Management"
  subTitle="list woreda information"
  [showBackButton]="false"
  [loading]="loading"
>
  <ng-template #mainContent>
    <div class="p-6">
      <h2 class="text-base font-semibold text-slate-700 mb-4">Woreda lists</h2>

      <app-data-table
        [columns]="columns"
        [data]="woredas"
        [loading]="loading"
        [total]="total"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [showIndex]="true"
        [showAddButton]="true"
        [showRefreshButton]="true"
        [showViewButton]="true"
        [showEditButton]="true"
        [showDeleteButton]="true"
        (pageChange)="onPageChange($event)"
        (addClick)="onAdd()"
        (refreshClick)="onRefresh()"
        (viewClick)="onView($event)"
        (editClick)="onEdit($event)"
        (deleteClick)="onDelete($event)"
      >
        <div extraTableHeader class="w-full flex justify-end">
          <app-woreda-filter
            [(searchText)]="searchText"
            (searchChange)="onSearch()"
            (clearFilters)="clearFilters()"
          ></app-woreda-filter>
        </div>
      </app-data-table>
    </div>
  </ng-template>
</app-page-header>

<!-- Create Woreda Modal -->
<app-woreda-create-modal
  [(visible)]="showCreateModal"
  (woredaCreated)="onWoredaCreated()"
></app-woreda-create-modal>

<!-- Edit Woreda Modal -->
<app-woreda-edit-modal
  [(visible)]="showEditModal"
  [woreda]="selectedWoreda"
  (woredaUpdated)="onWoredaUpdated()"
></app-woreda-edit-modal>

<!-- Delete Confirmation Modal -->
<app-confirmation-modal
  [(visible)]="showDeleteModal"
  title="Delete Woreda"
  message="Are you sure you want to delete this woreda?"
  confirmText="Delete"
  (confirm)="confirmDelete()"
></app-confirmation-modal>
