<form [formGroup]="form" class="space-y-6">
  <div class="border-b border-gray-200 pb-6">
    <h2 class="text-xl font-semibold text-gray-900 mb-4">Basic Information</h2>
    <div *ngIf="mode!='edit'">
      <ng-container *ngIf="!selectedFarmPlot; else selectedPlotBlock">
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Farm plot <span class="text-red-500">*</span>
        </label>
        <select
          formControlName="farmPlotId"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
          [class.border-red-500]="form.get('farmPlotId')?.invalid && form.get('farmPlotId')?.touched"
        >
          <option value="">Select farm plot</option>
          <option *ngFor="let p of farmPlots" [value]="p.id">{{ p.title }}</option>
        </select>
      </ng-container>

      <ng-template #selectedPlotBlock>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Farm plot <span class="text-red-500">*</span>
        </label>
        <div
          class="w-full px-4 py-3 border border-gray-200 rounded-lg bg-gray-50 text-gray-900"
          [class.border-red-500]="form.get('farmPlotId')?.invalid && form.get('farmPlotId')?.touched"
        >
          {{ selectedFarmPlot?.title }}
        </div>
      </ng-template>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Start date <span class="text-red-500">*</span>
        </label>
        <input
          type="date"
          formControlName="startDate"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
          [class.border-red-500]="form.get('startDate')?.invalid && form.get('startDate')?.touched"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Total duration (months) <span class="text-red-500">*</span>
        </label>
        <input
          type="number"
          formControlName="totalDurationMonths"
          min="1"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
          [class.border-red-500]="
          form.get('totalDurationMonths')?.invalid && form.get('totalDurationMonths')?.touched
        "
        />
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Total amount <span class="text-red-500">*</span>
      </label>
      <input
        type="number"
        formControlName="totalAmount"
        min="0.01"
        step="0.01"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
        [class.border-red-500]="form.get('totalAmount')?.invalid && form.get('totalAmount')?.touched"
      />
    </div>
  </div>

  <app-repeater
    [formArray]="payments"
    title="Installments"
    addButtonText="Add payment"
    emptyStateText="No payments added yet. Click 'Add payment' to add an installment."
    [showIndex]="true"
    [showEmptyStateAddButton]="false"
    (add)="addPayment()"
    (remove)="removePayment($event)"
  >
    <ng-template #itemTemplate let-item let-i="index">
      <div [formGroup]="item" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Due date <span class="text-red-500">*</span>
          </label>
          <input
            type="date"
            formControlName="dueDate"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            [class.border-red-500]="item.get('dueDate')?.invalid && item.get('dueDate')?.touched"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Amount <span class="text-red-500">*</span>
          </label>
          <input
            type="number"
            formControlName="amount"
            min="0.0001"
            step="0.01"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            [class.border-red-500]="item.get('amount')?.invalid && item.get('amount')?.touched"
          />
        </div>
      </div>
    </ng-template>
  </app-repeater>
</form>
