<form [formGroup]="form" class="space-y-6">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Farm plot <span class="text-red-500">*</span>
    </label>
    <select
      formControlName="farmPlotId"
      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
      [class.border-red-500]="form.get('farmPlotId')?.invalid && form.get('farmPlotId')?.touched"
    >
      <option value="">Select farm plot</option>
      <option *ngFor="let p of farmPlots" [value]="p.id">{{ p.title }}</option>
    </select>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Start date <span class="text-red-500">*</span>
      </label>
      <input
        type="date"
        formControlName="startDate"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
        [class.border-red-500]="form.get('startDate')?.invalid && form.get('startDate')?.touched"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Total duration (months) <span class="text-red-500">*</span>
      </label>
      <input
        type="number"
        formControlName="totalDurationMonths"
        min="1"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
        [class.border-red-500]="
          form.get('totalDurationMonths')?.invalid && form.get('totalDurationMonths')?.touched
        "
      />
    </div>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Total amount <span class="text-red-500">*</span>
    </label>
    <input
      type="number"
      formControlName="totalAmount"
      min="0.01"
      step="0.01"
      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
      [class.border-red-500]="form.get('totalAmount')?.invalid && form.get('totalAmount')?.touched"
    />
  </div>

  <div class="p-5 bg-gradient-to-r from-blue-50 to-blue-100/50 rounded-xl border border-blue-200">
    <div class="flex justify-between items-center">
      <span class="text-sm font-medium text-gray-700">Calculated end date</span>
      <span class="text-lg font-bold text-blue-700">
        {{ calculatedEndDate ? (calculatedEndDate | date: 'mediumDate') : '—' }}
      </span>
    </div>
  </div>
</form>
