<app-modal
  [(visible)]="visible"
  title="Admin Lease Action"
  size="md"
  [confirmText]="'Submit'"
  [cancelText]="'Cancel'"
  [confirmLoading]="confirmLoading"
  [showFooter]="true"
  [maskClosable]="false"
  (confirm)="onConfirm()"
  (cancel)="onCancel()"
  (visibleChange)="visibleChange.emit($event)"
>
  <div class="space-y-5">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">
        Decision <span class="text-red-500">*</span>
      </label>
      <select
        [(ngModel)]="decision"
        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-gray-900"
      >
        <option [ngValue]="'ACTIVE'">ACCEPT</option>
        <option [ngValue]="'TERMINATED'">Reject</option>
      </select>
    </div>
  </div>
</app-modal>
