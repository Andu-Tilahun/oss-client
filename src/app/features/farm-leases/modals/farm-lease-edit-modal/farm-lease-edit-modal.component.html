<app-modal
  [(visible)]="visible"
  title="Edit Lease Agreement"
  size="xl"
  [confirmText]="'Update Lease Agreement'"
  [confirmLoading]="isLoading"
  (confirm)="onSubmit()"
  (cancel)="onCancel()"
  (visibleChange)="visibleChange.emit($event)"
>
  <ng-template #modalBody>
    <app-farm-lease-form
      #farmLeaseForm
      mode="edit"
      [lease]="lease"
    ></app-farm-lease-form>
  </ng-template>
</app-modal>
