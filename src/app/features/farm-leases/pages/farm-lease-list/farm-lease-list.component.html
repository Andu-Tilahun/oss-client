<app-page-split-layout
  [showLeftTitle]="true"
  [showRightTitle]="true"
  leftTitle="Farm Lease Management"
  [rightTitle]="showInvestorPlotSelect ? 'Farm Plot Detail' : 'Lease Detail'"
  [rightItem]="showInvestorPlotSelect ? null : selectedLease"
  [rightEmptyMessage]="showInvestorPlotSelect ? 'Select a plot to view details.' : 'Select a row to view details.'"
  [showRightEditButton]="!showInvestorPlotSelect && shouldShowLeaseEditButton(selectedLease)"
  [rightActions]="showInvestorPlotSelect ? plotSelectionRightActions : rightActions"
  (rightEdit)="onEdit($event)"
>
  <ng-template #leftContent>
    <div *ngIf="!showInvestorPlotSelect">
      <app-data-table
        [columns]="columns"
        [data]="leases"
        [loading]="loading"
        [total]="total"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [showAddButton]="isInvestorUser"
        [showRefreshButton]="true"
        [showViewButton]="true"
        [showEditButton]="false"
        [showDeleteButton]="false"
        [addButtonText]="'Register'"
        (pageChange)="onPageChange($event)"
        (addClick)="onAdd()"
        (refreshClick)="onRefresh()"
        (viewClick)="onView($event)"
        (editClick)="onEdit($event)"
      >
        <div extraTableHeader class="w-full min-w-0">
          <app-farm-lease-filter
            *ngIf="myRequest"
            [(searchText)]="searchText"
            [(status)]="status"
            (filterChange)="onFilterChange()"
            (searchChange)="onFilterChange()"
            (clearFilters)="clearFilters()"
          ></app-farm-lease-filter>
        </div>
      </app-data-table>
    </div>

    <div *ngIf="showInvestorPlotSelect" class="space-y-4">
      <div class="flex items-center justify-between gap-3">
        <button
          type="button"
          class="flex-shrink-0 px-3 py-1.5 bg-blue-500 text-white rounded-lg text-sm font-medium
             hover:bg-blue-600 transition-colors disabled:opacity-60"
          (click)="closeInvestorPlotPicker()"
        >
          Back
        </button>
      </div>

      <app-farm-plot-filter
        [showSearch]="false"
        [showStatus]="false"
        [(searchText)]="searchText"
        [(soilType)]="investorPlotSoilType"
        [(sizeType)]="investorPlotSizeType"
        (filterChange)="onInvestorPlotSearch()"
        (searchChange)="onInvestorPlotSearch()"
        (clearFilters)="onInvestorPlotClearFilters()"
      ></app-farm-plot-filter>

      <app-data-card-layout
        [data]="investorFarmPlots"
        [loading]="investorPlotsLoading"
        [total]="investorFarmPlots.length"
        [pageSize]="investorFarmPlots.length || 10"
        [pageIndex]="1"
        [showAddButton]="false"
        [showRefreshButton]="false"
        [showDownloadButton]="false"
        [showViewButton]="false"
        [showEditButton]="false"
        [showDeleteButton]="false"
        [titleAccessor]="getInvestorPlotCardTitle"
        [createdDateAccessor]="getInvestorPlotCreatedDate"
        [thumbnailUrlAccessor]="getInvestorPlotThumbnailUrl"
        [thumbnailAltAccessor]="getInvestorPlotThumbnailAlt"
        [cardClickEnabled]="true"
        (cardClick)="onChoosePlot($event)"
        [noDataMessage]="'No available plots found.'"
      >
        <ng-template cardFooterTemplate let-plot>
          <div class="flex items-center gap-4 text-sm">
            <button type="button" class="action-link action-link--view" (click)="onViewPlot(plot)">View</button>
          </div>
        </ng-template>
      </app-data-card-layout>
    </div>
  </ng-template>

  <ng-template #rightContent let-lease>
    <div *ngIf="showInvestorPlotSelect">
      <app-farm-plot-view [plot]="plot"></app-farm-plot-view>
    </div>

    <app-tabs
      *ngIf="myRequest && !showInvestorPlotSelect"
      [tabs]="tabs"
      [activeTab]="activeTab"
      (activeTabChange)="activeTab = $event"
    >
      <div *ngIf="activeTab === 'detail'">
        <app-farm-lease-view [lease]="lease" [refreshKey]="detailRefreshKey"></app-farm-lease-view>
      </div>
      <div *ngIf="activeTab === 'farm-plot'">
        <app-farm-plot-view *ngIf="lease" [plot]="lease.farmPlot"></app-farm-plot-view>
      </div>
      <div *ngIf="activeTab === 'user'">
        <app-user-view *ngIf="lease" [user]="lease.investorUser"></app-user-view>
      </div>
      <div *ngIf="activeTab === 'follow-up'">
        <app-farm-followup-list
          [followUps]="lease?.followUpDtoList ?? []"
          [externalId]="lease?.id ?? ''"
        ></app-farm-followup-list>
      </div>
    </app-tabs>
  </ng-template>
</app-page-split-layout>

<app-farm-lease-create-modal
  [(visible)]="showCreateModal"
  [selectedFarmPlot]="plot"
  (leaseCreated)="onLeaseCreated()"
></app-farm-lease-create-modal>

<app-farm-lease-edit-modal
  [(visible)]="showEditModal"
  [lease]="selectedLease"
  (leaseUpdated)="onLeaseUpdated()"
></app-farm-lease-edit-modal>

<app-farm-lease-approve-modal
  [(visible)]="showAdminActionModal"
  [lease]="selectedLease"
  (decisionSelected)="onAdminDecision($event)"
></app-farm-lease-approve-modal>

<app-extension-worker-assign-modal [(visible)]="showAssignExtenstionWorkerModal"
                                   (selectedUserIdChange)="onSelectedUser($event)"
                                   (confirm)="onConfirm($event)">
</app-extension-worker-assign-modal>

<app-confirmation-modal
  [(visible)]="showConfirmationModal"
  title="Send Lease Agreement"
  [message]="'Are you sure you want to send ?'"
  type="warning"
  confirmText="Send Lease Agreement"
  [confirmLoading]="lockSend"
  (confirm)="handleSendConfirmation()"
></app-confirmation-modal>

<app-confirmation-modal
  [(visible)]="showCancelModal"
  title="Cancel Lease Agreement"
  [message]="'Are you sure you want to cancel ?'"
  type="warning"
  confirmText="Cancel Lease Agreement"
  [confirmLoading]="lockCancel"
  (confirm)="handleCancelConfirmation()"
></app-confirmation-modal>

<app-modal
  [(visible)]="showContractModal"
  title="Lease Contract Preview"
  [size]="'xxl'"
  [confirmText]="'Download PDF'"
  [cancelText]="'Close'"
  [confirmLoading]="contractLoading"
  [confirmDisabled]="contractLoading || !contractHtml"
  (confirm)="onDownloadContractFile()"
>
  <ng-template #modalBody>
    <div *ngIf="contractLoading" class="text-center py-8 text-gray-600">
      Loading contract...
    </div>
    <iframe
      *ngIf="!contractLoading"
      class="w-full h-[70vh] border border-gray-200 rounded-md bg-white"
      [attr.srcdoc]="contractHtml"
      title="Lease Contract Preview"
    ></iframe>
  </ng-template>
</app-modal>
