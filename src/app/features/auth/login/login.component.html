<div class="login-page">
  <div class="login-shell">
    <section class="brand-panel">
      <div class="brand-overlay one"></div>
      <div class="brand-overlay two"></div>

      <div class="brand-content">
        <div class="brand-logo">◌</div>
        <h1>AgriVest</h1>
        <p>access your contracts and invest more.</p>
        <button class="brand-chip" type="button">agitivest</button>
      </div>
    </section>

    <section class="form-panel">
      <div class="form-wrap">
        <h2>Login</h2>
        <p class="subtitle">Login to your account to continue</p>

        <div *ngIf="errorMessage" class="error-box">
          {{ errorMessage }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <div class="field">
            <input
              id="username"
              type="text"
              formControlName="username"
              placeholder="Username"
              [class.invalid]="submitted && f['username'].errors"
            />
            <small *ngIf="submitted && f['username'].errors">Username is required</small>
          </div>

          <div class="field password-field">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Password"
              [class.invalid]="submitted && f['password'].errors"
            />
            <button type="button" class="eye-btn" (click)="togglePassword()" aria-label="Toggle password visibility">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
            <small *ngIf="submitted && f['password'].errors?.['required']">Password is required</small>
            <small *ngIf="submitted && f['password'].errors?.['minlength']">Password must be at least 6 characters</small>
          </div>

          <button type="submit" [disabled]="isLoading" class="submit-btn">
            {{ isLoading ? 'Signing In...' : 'Sign In' }}
          </button>

          <div class="login-links">
            <a routerLink="/forgot-password">Forgot Password?</a>
            <a class="signup-bottom-link" routerLink="/signup">Sign up for new account</a>
          </div>
        </form>
      </div>
    </section>
  </div>
</div>
