<div class="auth-page relative">
  <!-- Top-right services menu -->
  <div class="absolute top-4 right-4 text-right">
    <button
      type="button"
      (click)="showServicesMenu = !showServicesMenu"
      class="text-sm font-semibold text-emerald-50 hover:text-white hover:underline drop-shadow"
    >
      Services
    </button>
    <div *ngIf="showServicesMenu" class="mt-2 space-y-2">
      <a
        routerLink="/public/clearing-agent-applicant"
        (click)="showServicesMenu = false"
        class="inline-block text-sm font-semibold text-emerald-50 hover:text-white hover:underline drop-shadow"
      >
        CCA Applicant (Register/Edit)
      </a>
    </div>
  </div>
  <div class="w-full max-w-md">
    <!-- Login Card -->
    <div class="auth-card backdrop-blur-sm bg-opacity-95">

      <!-- Logo/Icon -->
      <div class="flex justify-center mb-6">
        <div class="auth-icon">
          <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
          </svg>
        </div>
      </div>

      <!-- Header -->
      <div class="text-center mb-8">
        <h2 class="auth-title text-3xl font-bold mb-2">Welcome Back</h2>
        <p class="auth-subtitle">Sign in to continue to your account</p>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg">
        <div class="flex items-center">
          <svg class="w-5 h-5 text-red-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <p class="text-sm text-red-600">{{ errorMessage }}</p>
        </div>
      </div>

      <!-- Login Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">

        <!-- Username Field -->
        <div>
          <label for="username" class="block text-sm font-semibold text-gray-700 mb-2">
            Username
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
              </svg>
            </div>
            <input
              id="username"
              type="text"
              formControlName="username"
              placeholder="Enter your username"
              class="auth-input block w-full pl-10 pr-3 py-3 border rounded-lg transition duration-150"
              [class.border-red-500]="submitted && f['username'].errors"
              [class.border-gray-300]="!submitted || !f['username'].errors"
            />
          </div>
          <div *ngIf="submitted && f['username'].errors" class="mt-2 text-sm text-red-600">
            <p *ngIf="f['username'].errors['required']">Username is required</p>
          </div>
        </div>

        <!-- Password Field -->
        <div>
          <label for="password" class="block text-sm font-semibold text-gray-700 mb-2">
            Password
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
              </svg>
            </div>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="Enter your password"
              class="auth-input block w-full pl-10 pr-10 py-3 border rounded-lg transition duration-150"
              [class.border-red-500]="submitted && f['password'].errors"
              [class.border-gray-300]="!submitted || !f['password'].errors"
            />
            <button
              type="button"
              (click)="togglePassword()"
              class="absolute inset-y-0 right-0 pr-3 flex items-center"
            >
              <svg *ngIf="!showPassword" class="h-5 w-5 text-gray-400 hover:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
              </svg>
              <svg *ngIf="showPassword" class="h-5 w-5 text-gray-400 hover:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
              </svg>
            </button>
          </div>
          <div *ngIf="submitted && f['password'].errors" class="mt-2 text-sm text-red-600">
            <p *ngIf="f['password'].errors['required']">Password is required</p>
            <p *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</p>
          </div>
        </div>

        <!-- Forgot Password Link -->
        <div class="flex items-center justify-end">
          <a
            routerLink="/forgot-password"
            class="auth-link text-sm font-medium transition duration-150">
            Forgot password?
          </a>
        </div>

        <!-- Submit Button -->
        <div>
          <button
            type="submit"
            [disabled]="isLoading"
            class="auth-button w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-lg shadow-lg text-base font-semibold focus:outline-none transition-all duration-200 transform hover:scale-[1.02] disabled:transform-none"
          >
            <svg *ngIf="isLoading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span *ngIf="!isLoading">Sign In</span>
            <span *ngIf="isLoading">Signing In...</span>
          </button>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="text-center mt-6">
      <p class="text-sm text-white drop-shadow-lg">© 2025 Your Company. All rights reserved.</p>
    </div>
  </div>
</div>
