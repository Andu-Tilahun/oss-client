<form [formGroup]="subcityForm" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Name <span class="text-red-500">*</span>
    </label>
    <input
      type="text"
      formControlName="name"
      class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      [class.border-red-500]="subcityForm.get('name')?.invalid && subcityForm.get('name')?.touched"
    />
    <p *ngIf="subcityForm.get('name')?.invalid && subcityForm.get('name')?.touched" class="mt-1 text-sm text-red-600">
      Name is required
    </p>
  </div>

  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Region <span class="text-red-500">*</span>
    </label>
    <select
      formControlName="regionId"
      class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      [class.border-red-500]="subcityForm.get('regionId')?.invalid && subcityForm.get('regionId')?.touched"
    >
      <option value="">Select Region</option>
      <option *ngFor="let region of regions" [value]="region.id">
        {{ region.name }}
      </option>
    </select>
    <p *ngIf="subcityForm.get('regionId')?.invalid && subcityForm.get('regionId')?.touched" class="mt-1 text-sm text-red-600">
      Region is required
    </p>
  </div>
</form>
