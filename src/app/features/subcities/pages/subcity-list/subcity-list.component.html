<app-page-header
  pageTitle="Subcity/Zone Management"
  subTitle="list subcity/zone information"
  [showBackButton]="false"
  [loading]="loading"
>
  <ng-template #mainContent>
    <div class="p-6">
      <h2 class="text-base font-semibold text-slate-700 mb-4">Subcity/Zone lists</h2>

      <app-data-table
        [columns]="columns"
        [data]="subcities"
        [loading]="loading"
        [total]="total"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [showIndex]="true"
        [showAddButton]="true"
        [showRefreshButton]="true"
        [showViewButton]="true"
        [showEditButton]="true"
        [showDeleteButton]="true"
        (pageChange)="onPageChange($event)"
        (addClick)="onAdd()"
        (refreshClick)="onRefresh()"
        (viewClick)="onView($event)"
        (editClick)="onEdit($event)"
        (deleteClick)="onDelete($event)"
      >
        <div extraTableHeader class="w-full flex justify-end">
          <app-subcity-filter
            [(searchText)]="searchText"
            (searchChange)="onSearch()"
            (clearFilters)="clearFilters()"
          ></app-subcity-filter>
        </div>
      </app-data-table>
    </div>
  </ng-template>
</app-page-header>

<!-- Create Subcity Modal -->
<app-subcity-create-modal
  [(visible)]="showCreateModal"
  (subcityCreated)="onSubcityCreated()"
></app-subcity-create-modal>

<!-- Edit Subcity Modal -->
<app-subcity-edit-modal
  [(visible)]="showEditModal"
  [subcity]="selectedSubcity"
  (subcityUpdated)="onSubcityUpdated()"
></app-subcity-edit-modal>

<!-- Delete Confirmation Modal -->
<app-confirmation-modal
  [(visible)]="showDeleteModal"
  title="Delete Subcity/Zone"
  message="Are you sure you want to delete this subcity/zone?"
  confirmText="Delete"
  (confirm)="confirmDelete()
"></app-confirmation-modal>
