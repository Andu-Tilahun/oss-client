<app-detail-card>
  <div *ngIf="loading" class="text-sm text-gray-600">Loading department…</div>
  <div *ngIf="error && !loading" class="text-sm text-red-600">{{ error }}</div>
  <div *ngIf="!id && !loading" class="text-sm text-gray-500">No department selected.</div>

  <ng-container *ngIf="department && !loading">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3 mb-8">
      <h3 class="text-2xl font-bold text-gray-900">{{ department.name }}</h3>
      <span class="text-sm font-medium text-gray-600">{{ department.id }}</span>
    </div>

    <hr class="border-gray-200 mb-8" />

    <app-detail-section title="Department Information">
      <app-detail-field label="Name" [value]="department.name" />
    </app-detail-section>
  </ng-container>
</app-detail-card>
