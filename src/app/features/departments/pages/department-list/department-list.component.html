<app-page-header
  pageTitle="Department Management"
  subTitle="List department information"
  [showBackButton]="false"
  [loading]="loading"
>
  <ng-template #mainContent>
    <div class="p-6">
      <h2 class="text-base font-semibold text-slate-700 mb-4">Department lists</h2>

      <app-data-table
        [columns]="columns"
        [data]="displayedDepartments"
        [loading]="loading"
        [total]="total"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [showIndex]="true"
        [showAddButton]="true"
        [showRefreshButton]="true"
        [showViewButton]="true"
        [showEditButton]="true"
        [showDeleteButton]="true"
        (pageChange)="onPageChange($event)"
        (addClick)="onAdd()"
        (refreshClick)="onRefresh()"
        (viewClick)="onView($event)"
        (editClick)="onEdit($event)"
        (deleteClick)="onDelete($event)"
      >
        <div extraTableHeader class="w-full flex justify-end">
          <app-department-filter
            [(searchText)]="searchText"
            (searchChange)="onSearch()"
            (clearFilters)="clearFilters()"
          ></app-department-filter>
        </div>
      </app-data-table>
    </div>
  </ng-template>
</app-page-header>

<app-department-create-modal
  [(visible)]="showCreateModal"
  (departmentCreated)="onDepartmentCreated()"
></app-department-create-modal>

<app-department-edit-modal
  [(visible)]="showEditModal"
  [department]="selectedDepartment"
  (departmentUpdated)="onDepartmentUpdated()"
></app-department-edit-modal>

<app-confirmation-modal
  [(visible)]="showDeleteModal"
  title="Delete Department"
  message="Are you sure you want to delete this department?"
  confirmText="Delete"
  (confirm)="confirmDelete()"
></app-confirmation-modal>
