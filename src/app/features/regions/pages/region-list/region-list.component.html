<app-page-header
  pageTitle="Region Management"
  subTitle="list region information"
  [showBackButton]="false"
  [loading]="loading"
>
  <ng-template #mainContent>
    <div class="p-6">
      <h2 class="text-base font-semibold text-slate-700 mb-4">Region lists</h2>

      <app-data-table
        [columns]="columns"
        [data]="regions"
        [loading]="loading"
        [total]="total"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        [showIndex]="true"
        [showAddButton]="true"
        [showRefreshButton]="true"
        [showViewButton]="true"
        [showEditButton]="true"
        [showDeleteButton]="true"
        (pageChange)="onPageChange($event)"
        (addClick)="onAdd()"
        (refreshClick)="onRefresh()"
        (viewClick)="onView($event)"
        (editClick)="onEdit($event)"
        (deleteClick)="onDelete($event)"
      >
        <div extraTableHeader class="w-full flex justify-end">
          <app-region-filter
            [(searchText)]="searchText"
            (searchChange)="onSearch()"
            (clearFilters)="clearFilters()"
          ></app-region-filter>
        </div>
      </app-data-table>
    </div>
  </ng-template>
</app-page-header>

<!-- Create Region Modal -->
<app-region-create-modal
  [(visible)]="showCreateModal"
  (regionCreated)="onRegionCreated()"
></app-region-create-modal>

<!-- Edit Region Modal -->
<app-region-edit-modal
  [(visible)]="showEditModal"
  [region]="selectedRegion"
  (regionUpdated)="onRegionUpdated()"
></app-region-edit-modal>

<!-- Delete Confirmation Modal -->
<app-confirmation-modal
  [(visible)]="showDeleteModal"
  title="Delete Region"
  message="Are you sure you want to delete this region?"
  confirmText="Delete"
  (confirm)="confirmDelete()"
></app-confirmation-modal>
