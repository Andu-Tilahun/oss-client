<form [formGroup]="regionForm" class="space-y-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Name <span class="text-red-500">*</span>
    </label>
    <input
      type="text"
      formControlName="name"
      class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
      [class.border-red-500]="regionForm.get('name')?.invalid && regionForm.get('name')?.touched"
    />
    <p *ngIf="regionForm.get('name')?.invalid && regionForm.get('name')?.touched" class="mt-1 text-sm text-red-600">
      Name is required
    </p>
  </div>
</form>
