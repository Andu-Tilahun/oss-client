<section id="about" class="about-section">
  <div class="container">
    <div class="section-title-wrap">
      <h2>About Us</h2>
      <p>Learn where we operate and how we connect investors with sustainable farms.</p>
    </div>

    <div class="about-grid">
      <div class="about-card">
        <h3>{{ company?.name || 'AgriVest Farming' }}</h3>
        <p>
          We build trusted bridges between farmers and investors through transparent data, active field management,
          and measurable outcomes.
        </p>
      </div>
      <div class="map-wrap">
        <app-oss-map
          [latitude]="company?.latitude || 9.145"
          [longitude]="company?.longitude || 40.4897"
          [locations]="company ? [{ lat: company.latitude, lng: company.longitude, name: company.name }] : []"
          [zoom]="7"
          [height]="'320px'"
          [fitBounds]="true"
        ></app-oss-map>
      </div>
    </div>
  </div>
</section>
